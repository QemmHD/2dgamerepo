<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>adaptive score probe</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#100d0c;color:#f1dfb5;font:15px/1.5 ui-monospace,monospace}
main{width:min(720px,90vw);padding:32px;border:1px solid #8a6338;background:#1b1512;box-shadow:0 20px 80px #000}
button{font:700 18px inherit;padding:14px 22px;color:#17110c;background:#e8b954;border:0;border-radius:8px;cursor:pointer}
pre{white-space:pre-wrap;color:#b9efbd}
</style>
</head>
<body>
<main>
  <button id="start" type="button">Run live adaptive-score probe</button>
  <pre id="log">Waiting for a real user gesture…</pre>
</main>
<script type="module">
const log = document.querySelector('#log');
const errors = [];
const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
const assert = (condition, message) => { if (!condition) throw new Error(message); };
const approx = (actual, expected, message, epsilon = 0.015) => {
  assert(Number.isFinite(actual) && Math.abs(actual - expected) <= epsilon,
    `${message}: got ${actual}, expected ${expected}`);
};
window.addEventListener('error', (event) => errors.push(String(event.error?.message || event.message)));
window.addEventListener('unhandledrejection', (event) => errors.push(String(event.reason?.message || event.reason)));

document.querySelector('#start').addEventListener('click', async (event) => {
  event.currentTarget.disabled = true;
  try {
    const { AudioSystem, AUDIO_MIX } = await import('../../src/systems/AudioSystem.js');
    const { MENU_COMPOSITIONS } = await import('../../src/content/music.js');
    const audio = new AudioSystem();
    window.__musicProbe = audio;
    const mix = { music: 0.16, sfx: 0.18, voice: 0.22 };
    audio.setVolumes(mix.music, mix.sfx, mix.voice);
    assert(await audio.unlock(), 'AudioContext did not unlock');
    assert(audio.ctx?.state === 'running', `unexpected context state: ${audio.ctx?.state}`);
    approx(audio.musicBus?.gain.value, mix.music * AUDIO_MIX.musicTrim, 'music bus did not honor its independent volume');
    approx(audio.sfxBus?.gain.value, mix.sfx * AUDIO_MIX.sfxTrim, 'SFX bus did not honor its independent volume');
    approx(audio.voiceBus?.gain.value, mix.voice * AUDIO_MIX.voiceTrim, 'voice bus did not honor its independent volume');

    // Moving one explicit bus must not drag either of the other player-facing
    // sliders. This catches an easy regression to the old two-argument API,
    // where voice silently followed SFX.
    audio.setVolumes(mix.music, 0.06, mix.voice);
    await wait(80);
    approx(audio.musicBus?.gain.value, mix.music * AUDIO_MIX.musicTrim, 'SFX adjustment moved the music bus');
    approx(audio.sfxBus?.gain.value, 0.06 * AUDIO_MIX.sfxTrim, 'SFX bus did not reach its new target');
    approx(audio.voiceBus?.gain.value, mix.voice * AUDIO_MIX.voiceTrim, 'SFX adjustment moved the voice bus');
    audio.setVolumes(mix.music, mix.sfx, mix.voice);
    await wait(80);

    assert(audio.outputBus?.channelInterpretation === 'speakers', 'output bus did not use standards speaker mixing');
    assert(audio.outputBus?.channelCountMode === 'explicit', 'output bus channel count was not explicit');
    assert(audio.outputBus?.channelCount === 2, 'score did not begin in stereo mode');

    audio.playMusic('menu');
    await wait(500);
    const streamedFeature = MENU_COMPOSITIONS.find((score) => score.kind === 'recorded');
    audio._applyScore(streamedFeature);
    await wait(450);
    assert(audio._recorded && audio._recordedSource && !audio._recorded.paused,
      'streamed menu feature did not start through the live music graph');
    audio.setBiome('emberwood');
    audio.playMusic('gameplay');
    await wait(180);
    assert(!audio._recorded, 'streamed menu feature did not release on score change');

    // Mono is a live output policy, not a graph rebuild: the same context,
    // adaptive score, buses and scheduler must continue across both toggles.
    const continuity = {
      context: audio.ctx,
      score: audio._activeScore,
      scheduler: audio._schedId,
      musicBus: audio.musicBus,
      sfxBus: audio.sfxBus,
      voiceBus: audio.voiceBus,
      outputBus: audio.outputBus,
    };
    assert(audio.setMonoAudio(true) === true, 'mono preference did not enable');
    assert(audio.outputBus.channelCount === 1, 'mono preference did not collapse the output bus');
    await wait(120);
    assert(audio.ctx === continuity.context && audio._activeScore === continuity.score
      && audio._schedId === continuity.scheduler && audio.musicBus === continuity.musicBus
      && audio.sfxBus === continuity.sfxBus && audio.voiceBus === continuity.voiceBus
      && audio.outputBus === continuity.outputBus,
    'mono toggle rebuilt or interrupted the live adaptive-score graph');
    assert(audio.setMonoAudio(false) === false, 'stereo preference did not restore');
    assert(audio.outputBus.channelCount === 2, 'stereo preference did not restore two output channels');
    audio.setCombatState({ intensity: 0.24, scene: 'hunt' });
    await wait(450);
    audio.setCombatState({ intensity: 0.64, scene: 'swarm' });
    await wait(450);
    audio.setCombatState({ intensity: 0.93, scene: 'onslaught', lastStand: true });
    await wait(450);

    audio.playMusic('boss', 'solnakh');
    assert(await audio.prefetchBoss('solnakh'), 'Solnakh voice assets did not prefetch');
    let duckCount = 0;
    const liveDuck = audio._duck.bind(audio);
    audio._duck = (...args) => { duckCount++; return liveDuck(...args); };
    const arrivalCaption = audio.musicEvent('bossArrival', { bossId: 'solnakh' });
    assert(typeof arrivalCaption === 'string' && arrivalCaption.length > 0,
      'enabled boss voice did not return its accessible transcript');
    assert(duckCount === 1, `enabled boss voice did not make one music pocket (got ${duckCount})`);
    await wait(250);

    // A muted voice remains captioned but must not punch an unexplained hole in
    // the score. Check both the live bus and the sidechain call boundary.
    audio.setVolumes(mix.music, mix.sfx, 0);
    await wait(80);
    approx(audio.voiceBus?.gain.value, 0, 'voice mute did not reach the voice bus');
    const ducksBeforeMutedVoice = duckCount;
    const caption = audio.musicEvent('phase2', { bossId: 'solnakh' });
    assert(caption === 'Only embers remain.', `boss voice/caption mismatch: ${caption}`);
    assert(duckCount === ducksBeforeMutedVoice, 'muted boss voice still ducked the music bed');
    audio.setVolumes(mix.music, mix.sfx, mix.voice);
    await wait(80);
    approx(audio.voiceBus?.gain.value, mix.voice * AUDIO_MIX.voiceTrim, 'voice bus did not recover after unmute');
    await wait(1300);
    assert(audio._schedId != null, 'look-ahead scheduler did not start');
    assert(audio._activeScore?.kind === 'tracker', 'boss score did not use the tracker engine');
    assert(audio._combatScene === 'bossFinal', 'phase-two score state did not engage');

    audio.playMusic('menu');
    assert(audio._combatScene === 'calm' && audio._intensity === 0 && !audio._lastStand,
      'menu inherited the boss-final mix');
    await wait(2200);
    assert(audio.theme === 'menu' && audio._activeScore?.id !== 'boss_last_sun',
      'bar-quantized boss-to-menu transition did not complete');
    const report = {
      context: audio.ctx.state,
      scheduler: 'running',
      streamedFeature: streamedFeature.id,
      menuScore: audio._activeScore?.id,
      layers: { ...audio._layerTargets },
      buses: {
        music: audio.volMusic,
        sfx: audio.volSfx,
        voice: audio.volVoice,
      },
      monoContinuity: 'stereo -> mono -> stereo / graph stable',
      voiceDucks: { enabled: ducksBeforeMutedVoice, mutedAdded: duckCount - ducksBeforeMutedVoice },
      arrivalCaption,
      bossCaption: caption,
      pendingCleanupGraphs: audio._cleanupQueue.length,
    };
    audio.dispose();
    assert(audio._cleanupQueue.length === 0, 'dispose left transient audio graphs queued');
    log.textContent = JSON.stringify(report, null, 2);
    document.documentElement.dataset.qaReady = '1';
    document.documentElement.dataset.qaBuses = '3';
    document.documentElement.dataset.qaMono = 'stable';
    document.documentElement.dataset.qaVoice = 'mute-safe';
    document.title = `DONE EXC:${errors.length} score:${report.menuScore} buses:3 mono:stable voice:mute-safe`;
  } catch (error) {
    errors.push(String(error?.message || error));
    log.textContent = errors.join('\n');
    document.documentElement.dataset.qaReady = '1';
    document.documentElement.dataset.qaBuses = 'failed';
    document.title = `DONE EXC:${errors.length}`;
  }
}, { once: true });

// CI runs Chromium with autoplay explicitly allowed. The default remains a
// real visible gesture so local/device probes still exercise the player path.
if (new URLSearchParams(location.search).get('autorun') === '1') {
  document.querySelector('#start').click();
}
</script>
</body>
</html>
