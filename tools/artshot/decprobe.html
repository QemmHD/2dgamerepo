<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>dec probe</title>
<style>body{margin:0;background:#e0e}</style></head><body>
<canvas id="c" width="1200" height="300"></canvas>
<script type="module">
// Throwaway: render exactly what the game's decoration resolver returns for
// each type (after the AI load + cache clear), on magenta so any opaque
// background is unmissable. PUTs the sheet.
import { prewarmSprites, getDecorationSprite, clearDecorationCache } from '../../src/assets/ProceduralSprites.js';
import { loadDecorSprites } from '../../src/assets/DecorSprites.js';
import { MAP } from '../../src/config/GameConfig.js';
prewarmSprites();
const ok = await loadDecorSprites();
if (ok) clearDecorationCache();
const cv = document.getElementById('c');
const entries = MAP.decorationTypes.map((type) => ({ type, sprite: getDecorationSprite(type) }));
const maxRowW = 1800;
const pad = 10;
let cursorX = pad, cursorY = 40, rowH = 0, usedW = 0;
for (const entry of entries) {
  const cellW = Math.max(90, entry.sprite.width + 16);
  const cellH = entry.sprite.height + 64;
  if (cursorX > pad && cursorX + cellW > maxRowW) {
    cursorX = pad;
    cursorY += rowH;
    rowH = 0;
  }
  entry.x = cursorX;
  entry.y = cursorY;
  cursorX += cellW;
  rowH = Math.max(rowH, cellH);
  usedW = Math.max(usedW, cursorX);
}
cv.width = Math.max(320, Math.min(maxRowW, usedW + pad));
cv.height = Math.max(180, cursorY + rowH + pad);
const ctx = cv.getContext('2d');
ctx.fillStyle = '#dd00dd'; ctx.fillRect(0, 0, cv.width, cv.height);
ctx.font = '12px monospace';
for (const { type: t, sprite: s, x, y } of entries) {
  ctx.drawImage(s, x, y);
  ctx.fillStyle = '#000';
  ctx.fillText(t + ' ' + s.width + 'x' + s.height, x, y - 10);
}
cv.toBlob(async (b) => {
  await fetch('/__save/decprobe.png', { method: 'PUT', body: b });
  document.title = 'DONE ok=' + ok;
});
</script></body></html>
