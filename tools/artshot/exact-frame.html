<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EMBERWAKE exact frame harness</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
  iframe { display: block; border: 0; }
</style>
</head>
<body>
<iframe id="frame" title="Exact viewport game harness"></iframe>
<script>
(() => {
    'use strict';
    const root = document.documentElement;
    const params = new URLSearchParams(location.search);
    const widthText = params.get('width') || '';
    const heightText = params.get('height') || '';
    const width = /^(0|[1-9]\d*)$/.test(widthText) ? Number(widthText) : NaN;
    const height = /^(0|[1-9]\d*)$/.test(heightText) ? Number(heightText) : NaN;
    const target = location.hash.slice(1);
    const local = location.hostname === 'localhost'
        || location.hostname === '127.0.0.1' || location.hostname === '[::1]';
    const valid = local && Number.isSafeInteger(width) && width >= 320 && width <= 2048
        && Number.isSafeInteger(height) && height >= 240 && height <= 2048
        && target.startsWith('/tools/artshot/harness.html?');
    if (!valid) {
        root.dataset.qaReady = '1';
        root.dataset.qaErrorKeys = 'frame';
        document.title = 'DONE EXC:1 enemies:0 map:unknown error:frame invalid exact viewport request';
        return;
    }

    const frame = document.getElementById('frame');
    frame.width = String(width);
    frame.height = String(height);
    frame.style.width = `${width}px`;
    frame.style.height = `${height}px`;
    frame.src = target;
    const startedAt = performance.now();
    const mirror = setInterval(() => {
        try {
            const childRoot = frame.contentDocument?.documentElement;
            const childTitle = frame.contentDocument?.title || '';
            if (childRoot && childTitle.startsWith('DONE EXC:')) {
                for (const name of childRoot.getAttributeNames()) {
                    if (name.startsWith('data-qa-')) {
                        root.setAttribute(name, childRoot.getAttribute(name) || '');
                    }
                }
                root.dataset.qaFrameViewport = `${width}x${height}`;
                document.title = childTitle;
                clearInterval(mirror);
            } else if (performance.now() - startedAt > 6000) {
                root.dataset.qaReady = '1';
                root.dataset.qaErrorKeys = 'frame';
                document.title = 'DONE EXC:1 enemies:0 map:unknown error:frame child did not finish';
                clearInterval(mirror);
            }
        } catch (error) {
            root.dataset.qaReady = '1';
            root.dataset.qaErrorKeys = 'frame';
            document.title = `DONE EXC:1 enemies:0 map:unknown error:frame ${String(error)}`;
            clearInterval(mirror);
        }
    }, 20);
})();
</script>
</body>
</html>
