<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EMBERWAKE art harness</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
  /* Mirror the shipped stage centering. Cover-fit phone canvases are taller
     than the viewport; without flex centering the harness crops only the foot
     while Renderer.safeArea correctly assumes an even top/bottom crop. */
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; }
</style>
</head>
<body>
<!--
  Headless art-screenshot harness (dev tooling — NOT deployed; Pages ships src/).
  Boots the real Game.js, starts a run, steps the sim synchronously to a chosen
  game-time, then renders one frame for a screenshot. Used by the higgsfield
  AI-art loop (screenshot -> Nano Banana 2 improve -> implement -> verify).

  Serve the repo ROOT with tools/artshot/serve.py, then screenshot:
    chrome --headless=new --no-sandbox --disable-gpu --hide-scrollbars \
      --mute-audio --autoplay-policy=no-user-gesture-required \
      --disable-background-networking --disable-component-update \
      --force-device-scale-factor=1 --window-size=1600,900 \
      --virtual-time-budget=12000 --user-data-dir=<tmp> --screenshot=<out.png> \
      "http://127.0.0.1:PORT/tools/artshot/harness.html?seconds=35"

  Query params:
    seconds  game-time to simulate before the shot (default 12)
    badge    "1" stamps an EXC:<n> exception-count badge top-left (self-check)
    screen   "menu" to shoot the main menu instead of a run; with tab=<name>
    input    active input convention: "keyboard", "pointer", or "touch"
             (legacy touch=1 still forces touch and takes precedence)
    focus    current menu hotspot key (encode # as %23), or an action fallback
    reduced "1" persists Reduced Effects before staging the requested frame
    uiscale  Combat HUD size: "100", "115", or "130"
    contrast high-contrast combat cues: "1" on or "0" off
    settingspane  Settings sub-pane: "general" or "accessibility" (menu only)
    dev      "1" keeps the shipped developer Settings controls visible
    captions "1" on or "0" off; captiondetail "essential" or "full"
    mono     mono audio output: "1" on or "0" off
    voicevol independent voice volume: 0..100 in ten-point increments
    vibration saved touch-vibration strength: "off", "low", or "full"
    vibrationcap force the QA capability receipt: "1" available or "0" unavailable
    caption  stage a gameplay caption fixture: "voice" or "danger" (run only)
    bosswarning "1" stages the real Emberwood boss-warning integration (run only)
    statuses "all" stages all seven combat-status cues on one enemy (run only)
    bpxp / bpclaimthrough / bpreceipt  seed Battle-Pass QA states (menu only)
    mines=<preset> / minessafe=<n>  stage an honest Mines quote (menu only)
    minesFocus=<0..24>  select a Mines tile for keyboard-focus visual QA
    boss=1 / bossid=<id> / bosshp=<0..1> / bossattack=<move id> / bosskill=1
             spawn a live apex directly and stage its choreography state
    tp       teleport before the shot: "building" (just south of the first
             placed building), "buildingInside" (inside its cutaway),
             "buildingExterior" (offset view of the first intact house),
             "vigilSite" (stage a non-combat Living Vigil discovery),
             "vigilBeacon" (kindle a guardian challenge),
             "vigilBeaconCleared" (stage its earned receipt), or "x,y" coords
    skipOnboarding  forced to "1" here (deterministic frames); pass "=0"
             explicitly to shoot the guided-first-run hint pill itself
-->
<div id="stage"><canvas id="game"></canvas></div>
<script>
// Deterministic frames: force ?skipOnboarding=1 unless the URL sets it
// explicitly. A fresh headless profile has runs === 0, which would otherwise
// arm the guided-first-run hints and draw the "Move — WASD..." pill over
// showcase/visual-diff shots. Classic script so it runs BEFORE the module
// below — GameConfig.js reads location.search at import time.
if (!/[?&]skipOnboarding=/.test(location.search)) {
    const q = location.search ? location.search + '&' : '?';
    history.replaceState(null, '', location.pathname + q + 'skipOnboarding=1' + location.hash);
}
</script>
<script type="module">
// Neutralize WebAudio: a live real-time AudioContext keeps the renderer's event
// loop busy and prevents --virtual-time-budget from fast-forwarding (the page
// hangs). AudioSystem feature-detects window.AudioContext at runtime and no-ops
// cleanly when it's absent, so gameplay/visuals are unaffected.
window.AudioContext = undefined;
window.webkitAudioContext = undefined;

import { Renderer } from '../../src/systems/Renderer.js';
import { GameLoop } from '../../src/core/GameLoop.js';
import { Game } from '../../src/core/Game.js';
import { SaveSystem } from '../../src/systems/SaveSystem.js';
import { Input } from '../../src/core/Input.js';
import { KeyboardInput } from '../../src/core/KeyboardInput.js';
import { TouchJoystick } from '../../src/core/TouchJoystick.js';
import { TouchButtons } from '../../src/core/TouchButtons.js';
import { prewarmSprites, getGlowSprite } from '../../src/assets/ProceduralSprites.js';
import { loadLpcSprites } from '../../src/assets/LpcSprites.js';
import { loadWorldTextures } from '../../src/assets/WorldTextures.js';
import { loadIconGlyphs } from '../../src/assets/CustomIcons.js';
import { loadMonsterSprites } from '../../src/assets/MonsterSprites.js';
import { loadEnemyAiSprites } from '../../src/assets/EnemySprites.js';
import { loadHeroAiSprites } from '../../src/assets/HeroAiSprites.js';
import { clearHeroFrameCache, clearDecorationCache } from '../../src/assets/ProceduralSprites.js';
import { loadObstacleSprites } from '../../src/assets/ObstacleSprites.js';
import { loadDecorSprites } from '../../src/assets/DecorSprites.js';
import { loadRenderedProps } from '../../src/assets/RenderedWeaponProps.js';
import { getMenuImages } from '../../src/assets/MenuImages.js';
import { PASS_COSMETIC_MILESTONES, bpProgress } from '../../src/content/battlePass.js';
import { Enemy } from '../../src/entities/Enemy.js';
import { XPGem } from '../../src/entities/XPGem.js';
import { Coin } from '../../src/entities/Coin.js';
import { HealthOrb } from '../../src/entities/HealthOrb.js';
import { DamageNumber } from '../../src/entities/DamageNumber.js';
import { WEAPON_AURA } from '../../src/content/weapons.js';
import { photoFilterIndexById } from '../../src/content/photoFilters.js';

const ERR = [];
window.__ERR = ERR;
window.addEventListener('error', (e) => ERR.push(String(e.message || e.error || e)));
window.addEventListener('unhandledrejection', (e) => ERR.push('promise: ' + String(e.reason)));

const params = new URLSearchParams(location.search);
const SECONDS = parseFloat(params.get('seconds') || '12');
const BADGE = params.get('badge') === '1';
const SCREEN = params.get('screen') || 'run';   // 'run' | 'menu'
const TAB = params.get('tab') || 'play';
const QA_DEV = params.get('dev') === '1';
// showcase="1" (all) or a csv of enemy types → spawn a ring of them around the
// player and shoot after a short settle, so a verification frame shows the exact
// sprites regardless of when they'd naturally spawn.
const SHOWCASE = params.get('showcase');
// EMBERGLASS Keeper's Lens: ?photo=1 enters photo mode after the sim settles,
// ?photozoom=<z> sets the zoom (0.75–2.0) for veil-alignment screenshots.
const PHOTO = params.get('photo') === '1';
const PHOTOZOOM = parseFloat(params.get('photozoom') || '1');
const PHOTOFILTER = params.get('filter');   // filter id (e.g. 'gloam'); default none
// Adaptive-quality QA (roadmap #5 visual pass). gfxtier forces a governor tier
// for the final frame; debughud shows the GFXTIER/profiler readout; the scenario
// knobs spawn a stress frame. All QA-only — no shipped gameplay is touched.
const GFXTIER = params.has('gfxtier') ? parseInt(params.get('gfxtier'), 10) : null;
const DEBUGHUD = params.get('debughud') === '1';
const DENSE = parseInt(params.get('dense') || '0', 10);      // extra enemies
const PICKUPS = parseInt(params.get('pickups') || '0', 10);  // gems + coins + orbs
const DMGNUM = parseInt(params.get('dmgnum') || '0', 10);    // floating damage numbers
const QABOSSID = params.get('bossid');
const QABOSS = params.get('boss') === '1' || !!QABOSSID;    // spawn a live boss directly
const QABOSSHP = params.has('bosshp') ? parseFloat(params.get('bosshp')) : null;
const QABOSSATTACK = params.get('bossattack');
const QABOSSFRAMES = Math.max(1, parseInt(params.get('bossframes') || '12', 10) || 12);
const QABOSSKILL = params.get('bosskill') === '1';
const MAP = params.get('map');                               // force selected map (weather)
const INPUT_REQUEST = params.get('input');
const INPUT_MODE = ['keyboard', 'pointer', 'touch'].includes(INPUT_REQUEST)
    ? INPUT_REQUEST
    : null;
const MENU_FOCUS = (params.get('focus') || '').trim();
const REDUCED = params.get('reduced') === '1';
const UI_SCALE_REQUEST = params.has('uiscale') ? params.get('uiscale') : null;
const QA_UI_SCALE = ['100', '115', '130'].includes(UI_SCALE_REQUEST)
    ? Number(UI_SCALE_REQUEST)
    : null;
const CONTRAST_REQUEST = params.has('contrast') ? params.get('contrast') : null;
const QA_HIGH_CONTRAST = CONTRAST_REQUEST === '1'
    ? true
    : CONTRAST_REQUEST === '0'
        ? false
        : null;
const SETTINGS_PANE_REQUEST = params.has('settingspane') ? params.get('settingspane') : null;
const QA_SETTINGS_PANE = ['general', 'accessibility'].includes(SETTINGS_PANE_REQUEST)
    ? SETTINGS_PANE_REQUEST
    : null;
const CAPTIONS_REQUEST = params.has('captions') ? params.get('captions') : null;
const QA_CAPTIONS = CAPTIONS_REQUEST === '1'
    ? true
    : CAPTIONS_REQUEST === '0'
        ? false
        : null;
const CAPTION_DETAIL_REQUEST = params.has('captiondetail') ? params.get('captiondetail') : null;
const QA_CAPTION_DETAIL = ['essential', 'full'].includes(CAPTION_DETAIL_REQUEST)
    ? CAPTION_DETAIL_REQUEST
    : null;
const MONO_REQUEST = params.has('mono') ? params.get('mono') : null;
const QA_MONO = MONO_REQUEST === '1'
    ? true
    : MONO_REQUEST === '0'
        ? false
        : null;
const VOICE_VOLUME_REQUEST = params.has('voicevol') ? params.get('voicevol') : null;
const VOICE_VOLUME_PRESETS = Array.from({ length: 11 }, (_, index) => String(index * 10));
const QA_VOICE_VOLUME = VOICE_VOLUME_PRESETS.includes(VOICE_VOLUME_REQUEST)
    ? Number(VOICE_VOLUME_REQUEST)
    : null;
const VIBRATION_REQUEST = params.has('vibration') ? params.get('vibration') : null;
const QA_VIBRATION = ['off', 'low', 'full'].includes(VIBRATION_REQUEST)
    ? VIBRATION_REQUEST
    : null;
const VIBRATION_CAP_REQUEST = params.has('vibrationcap') ? params.get('vibrationcap') : null;
const QA_VIBRATION_CAP = VIBRATION_CAP_REQUEST === '1'
    ? true
    : VIBRATION_CAP_REQUEST === '0'
        ? false
        : null;
const CAPTION_REQUEST = params.has('caption') ? params.get('caption') : null;
const QA_CAPTION = ['voice', 'danger'].includes(CAPTION_REQUEST) ? CAPTION_REQUEST : null;
const BOSS_WARNING_REQUEST = params.has('bosswarning') ? params.get('bosswarning') : null;
const QA_BOSS_WARNING = BOSS_WARNING_REQUEST === '1';
const STATUSES_REQUEST = params.has('statuses') ? params.get('statuses') : null;
const QA_STATUSES = STATUSES_REQUEST === 'all' ? 'all' : null;
// Roadmap #6 profiling pass (tooling only). profile=<N> runs N measured frames
// with the FrameProfiler enabled, wrapping update()/render() so the top-level
// buckets (normally timed by GameLoop, which sync-stepping bypasses) populate,
// then PUTs game.profiler.ema + live counts to __out/profile-<proftag>.json.
// Off by default → the CI harness-smoke path is byte-for-byte unchanged.
const PROFILE = parseInt(params.get('profile') || '0', 10);
const PROFTAG = (params.get('proftag') || 'run').replace(/[^A-Za-z0-9._-]/g, '');
const VEILSCALE = params.has('veilscale') ? parseFloat(params.get('veilscale')) : null;
// touch=1 wires TouchButtons with supported forced on, so the touch-only HUD
// branches (action discs, lifted pips, hidden kindle bar) are verifiable
// headlessly — desktop Chromium never reports touch support on its own.
const FORCED_TOUCH = params.get('touch') === '1';
const TOUCH = FORCED_TOUCH || INPUT_MODE === 'touch';
// touch=1 is the historical forced-touch visual branch. Keep it authoritative
// even when a conflicting input= value is accidentally supplied.
const ACTIVE_INPUT_MODE = FORCED_TOUCH ? 'touch' : INPUT_MODE;
const BPXP = params.has('bpxp') ? Math.max(0, parseInt(params.get('bpxp'), 10) || 0) : null;
const BPCLAIMTHROUGH = Math.max(0, parseInt(params.get('bpclaimthrough') || '0', 10) || 0);
const BPRECEIPT = params.get('bpreceipt') === '1';
const MINESBET = params.has('mines') ? Number(params.get('mines')) : null;
const MINESSAFE = Math.max(0, Math.min(18, parseInt(params.get('minessafe') || '2', 10) || 0));
const MINES_FOCUS_REQUEST = params.get('minesFocus');
const MINES_FOCUS_PARSED = MINES_FOCUS_REQUEST == null ? null : Number(MINES_FOCUS_REQUEST);
const MINES_FOCUS = Number.isInteger(MINES_FOCUS_PARSED)
    && MINES_FOCUS_PARSED >= 0 && MINES_FOCUS_PARSED <= 24
    ? MINES_FOCUS_PARSED
    : null;
let qaBossSummary = '';
let qaExpectedMenuFocusKey = null;
let qaStatusEnemy = null;
const qaHapticEvents = [];
const DT = 1 / 60;
const TOTAL_FRAMES = Math.round(SECONDS / DT);

async function boot() {
    const canvas = document.getElementById('game');
    const renderer = new Renderer(canvas);
    const keyboard = new KeyboardInput();
    const touch = new TouchJoystick(renderer);
    let buttons = null;
    if (TOUCH) { buttons = new TouchButtons(renderer); buttons.supported = true; }
    const input = new Input({ keyboard, touch, buttons });
    if (TOUCH) input.setModality('touch');

    let game;
    const loop = new GameLoop({ update: (dt) => game.update(dt), render: () => game.render() });

    prewarmSprites();
    for (const k in WEAPON_AURA) getGlowSprite(WEAPON_AURA[k].color);
    await Promise.all([loadLpcSprites(), loadWorldTextures(), loadIconGlyphs(), loadMonsterSprites(), loadEnemyAiSprites(),
        loadHeroAiSprites().then((ok) => { if (ok) clearHeroFrameCache(); }),
        loadObstacleSprites(),
        loadDecorSprites().then((ok) => { if (ok) clearDecorationCache(); }),
        loadRenderedProps()]);

    // Seed requested preferences through the production SaveSystem BEFORE Game
    // boots. The receipt therefore exercises the real cold-load wiring instead
    // of repairing subsystems manually after construction.
    const preferenceSeed = new SaveSystem();
    if (REDUCED) preferenceSeed.setSetting('reducedEffects', true);
    if (QA_UI_SCALE != null) preferenceSeed.setSetting('uiScale', QA_UI_SCALE);
    if (QA_HIGH_CONTRAST != null) preferenceSeed.setSetting('highContrast', QA_HIGH_CONTRAST);
    if (QA_CAPTIONS != null) preferenceSeed.setSetting('captions', QA_CAPTIONS);
    if (QA_CAPTION_DETAIL) preferenceSeed.setSetting('captionDetail', QA_CAPTION_DETAIL);
    if (QA_MONO != null) preferenceSeed.setSetting('monoAudio', QA_MONO);
    if (QA_VOICE_VOLUME != null) preferenceSeed.setSetting('volVoice', QA_VOICE_VOLUME / 100);
    if (QA_VIBRATION) preferenceSeed.setSetting('vibration', QA_VIBRATION);

    game = new Game({ renderer, input, loop });
    game.showDebug = false;          // no debug grid/HUD in the art frame
    if (QA_VIBRATION_CAP != null) game.haptics.supported = () => QA_VIBRATION_CAP;
    const liveHapticPulse = game.haptics.pulse.bind(game.haptics);
    game.haptics.pulse = (kind) => {
        qaHapticEvents.push(String(kind));
        return liveHapticPulse(kind);
    };
    if (QA_SETTINGS_PANE) game.settingsPane = QA_SETTINGS_PANE;
    if (ACTIVE_INPUT_MODE) input.setModality(ACTIVE_INPUT_MODE);

    if (INPUT_REQUEST && !INPUT_MODE) ERR.push(`input: unsupported mode '${INPUT_REQUEST}'`);
    if (UI_SCALE_REQUEST != null && QA_UI_SCALE == null) {
        ERR.push(`uiscale: expected 100, 115, or 130, got '${UI_SCALE_REQUEST}'`);
    }
    if (CONTRAST_REQUEST != null && QA_HIGH_CONTRAST == null) {
        ERR.push(`contrast: expected 1 or 0, got '${CONTRAST_REQUEST}'`);
    }
    if (SETTINGS_PANE_REQUEST != null && QA_SETTINGS_PANE == null) {
        ERR.push(`settingspane: expected 'general' or 'accessibility', got '${SETTINGS_PANE_REQUEST}'`);
    }
    if (CAPTIONS_REQUEST != null && QA_CAPTIONS == null) {
        ERR.push(`captions: expected 1 or 0, got '${CAPTIONS_REQUEST}'`);
    }
    if (CAPTION_DETAIL_REQUEST != null && QA_CAPTION_DETAIL == null) {
        ERR.push(`captiondetail: expected 'essential' or 'full', got '${CAPTION_DETAIL_REQUEST}'`);
    }
    if (MONO_REQUEST != null && QA_MONO == null) {
        ERR.push(`mono: expected 1 or 0, got '${MONO_REQUEST}'`);
    }
    if (VOICE_VOLUME_REQUEST != null && QA_VOICE_VOLUME == null) {
        ERR.push(`voicevol: expected 0 through 100 in ten-point increments, got '${VOICE_VOLUME_REQUEST}'`);
    }
    if (VIBRATION_REQUEST != null && QA_VIBRATION == null) {
        ERR.push(`vibration: expected 'off', 'low', or 'full', got '${VIBRATION_REQUEST}'`);
    }
    if (VIBRATION_CAP_REQUEST != null && QA_VIBRATION_CAP == null) {
        ERR.push(`vibrationcap: expected 1 or 0, got '${VIBRATION_CAP_REQUEST}'`);
    }
    if (CAPTION_REQUEST != null && QA_CAPTION == null) {
        ERR.push(`caption: expected 'voice' or 'danger', got '${CAPTION_REQUEST}'`);
    }
    if (BOSS_WARNING_REQUEST != null && !QA_BOSS_WARNING) {
        ERR.push(`bosswarning: expected 1, got '${BOSS_WARNING_REQUEST}'`);
    }
    if (STATUSES_REQUEST != null && QA_STATUSES == null) {
        ERR.push(`statuses: expected 'all', got '${STATUSES_REQUEST}'`);
    }
    if (MINES_FOCUS_REQUEST != null && MINES_FOCUS == null) {
        ERR.push(`minesFocus: expected an integer from 0 through 24, got '${MINES_FOCUS_REQUEST}'`);
    }
    if (MENU_FOCUS && SCREEN !== 'menu') ERR.push('focus: menu hotspot selection requires screen=menu');
    if (QA_SETTINGS_PANE && (SCREEN !== 'menu' || TAB !== 'settings')) {
        ERR.push('settingspane: selection requires screen=menu and tab=settings');
    }
    if (QA_STATUSES && SCREEN === 'menu') ERR.push('statuses: showcase requires a gameplay frame');
    if (QA_CAPTION && SCREEN === 'menu') ERR.push('caption: fixture requires a gameplay frame');
    if (QA_BOSS_WARNING && SCREEN === 'menu') ERR.push('bosswarning: fixture requires a gameplay frame');
    if (MINES_FOCUS != null && (SCREEN !== 'menu' || MINESBET == null)) {
        ERR.push('minesFocus: tile selection requires screen=menu and mines=<preset>');
    }

    if (SCREEN === 'menu') {
        game.screen = 'start';
        game.menuTab = TAB;
        if (BPXP != null) {
            game.saveSystem.data.battlePass.xp = BPXP;
            game.saveSystem.data.battlePass.claimed = Array.from({ length: Math.min(50, BPCLAIMTHROUGH) }, (_, i) => i + 1);
            for (const [levelText, id] of Object.entries(PASS_COSMETIC_MILESTONES)) {
                if (Number(levelText) <= BPCLAIMTHROUGH && !game.saveSystem.data.cosmetics.unlocked.includes(id)) {
                    game.saveSystem.data.cosmetics.unlocked.push(id);
                }
            }
            if (BPRECEIPT) {
                game.bpResult = {
                    gained: 932, levelAfter: bpProgress(BPXP).level, leveledUp: true,
                    everflameCaches: 0, everflameCoins: 0,
                    // Living Vigil is an attributed slice of Deeds, not extra
                    // XP; stage it so the receipt row stays visually covered.
                    breakdown: { kindling: 60, endurance: 210, hunt: 230, deeds: 282, livingVigil: 84, trials: 75, threat: 75 },
                };
            }
        }
        // Menu art is intentionally lazy in the shipped loop. The harness only
        // renders a few explicit frames, so wait briefly for the relevant art
        // before its final frame instead of capturing the procedural fallback.
        const menuImages = getMenuImages();
        const menuDeadline = performance.now() + 3000;
        while (performance.now() < menuDeadline) {
            const coreReady = menuImages.bg && menuImages.title;
            const tabReady = TAB !== 'battlepass' || menuImages.passBg;
            if (coreReady && tabReady) break;
            await new Promise((resolve) => setTimeout(resolve, 40));
        }
        // Tick a few frames so menu intro animations settle.
        for (let i = 0; i < 90; i++) { try { game.update(DT); } catch (e) { ERR.push('menu ' + i + ': ' + String(e && e.stack || e)); break; } }
        if (MINESBET != null) {
            try {
                game.saveSystem.data.totalCoins = Math.max(game.saveSystem.data.totalCoins, 10000);
                game.minigame.openMines(MINESBET);
                if (!game.minigame.mines) throw new Error(`could not stage preset ${MINESBET}`);
                // QA-only known mine positions make the requested number of
                // safe reveals deterministic while all displayed math still
                // comes from the production quote/cashout path.
                game.minigame.mines.mineSet = [19, 20, 21, 22, 23, 24];
                if (MINES_FOCUS != null) game.minesFocusIndex = MINES_FOCUS;
                for (let i = 0; i < MINESSAFE; i++) game.minigame.minesReveal(i);
                for (let i = 0; i < 42; i++) game.update(DT);
            } catch (e) { ERR.push('mines: ' + String(e && e.stack || e)); }
        }
        game.render();
        // The menu's tab-switch fade runs on WALL-CLOCK time (MenuRenderer._t),
        // so the first render is frame 0 of the 180ms transition — near-fully
        // transparent tab content. Force the transition complete and render
        // again so menu shots show the settled screen, not the fade-in.
        if (game.ui && game.ui.menu) { game.ui.menu._transT0 = -10; game.render(); }
        if (MENU_FOCUS) {
            // Hotspots are generated by the real settled render above. Resolve
            // by stable identity (full key/base key) or semantic action, never
            // by a position that changes when controls are inserted/reordered.
            const hotspots = game.ui?.menu?.hotspots || [];
            const target = hotspots.find((entry) => entry.key === MENU_FOCUS
                || entry.baseKey === MENU_FOCUS)
                || hotspots.find((entry) => entry.action === MENU_FOCUS);
            if (!target) {
                ERR.push(`focus: no current hotspot matches '${MENU_FOCUS}' on tab '${TAB}'`);
            } else {
                qaExpectedMenuFocusKey = target.key;
                game.menuFocusKey = target.key;
                game.menuFocusNeedsRefresh = false;
                game.render();
            }
        }
    } else {
        if (MAP) {
            try {
                // QA profiles are fresh, so campaign-gated maps would silently
                // fall back to Emberwood. Unlock only inside this dev harness,
                // then fail loudly if the requested biome still cannot select.
                game.saveSystem.setSetting('unlockMaps', true);
                if (!game.saveSystem.setSelectedMap(MAP)) ERR.push(`map: could not select '${MAP}'`);
            } catch (e) { ERR.push('map: ' + String(e)); }
        }
        game._startRun();                // default hero (monkey "Pyra"), default map
        game.player.damageTakenMul = 0;  // harness godmode: survive the swarm for the shot
        if (QA_BOSS_WARNING) game._startBossWarning('stormwingAlpha');

        // Showcase: spawn a ring of specific enemy types around the player and only
        // settle briefly, so the frame shows those exact sprites (mid-run spawn
        // timing/weapons would otherwise hide or kill them before the shot).
        let frames = TOTAL_FRAMES;
        if (SHOWCASE) {
            const types = SHOWCASE === '1'
                ? ['slime', 'bat', 'crawler', 'spitter', 'mite']
                : SHOWCASE.split(',').map((s) => s.trim()).filter(Boolean);
            const px = game.player.x, py = game.player.y, R = 300;
            types.forEach((t, i) => {
                const a = -Math.PI / 2 + i * (2 * Math.PI / types.length);
                try { game.enemies.push(new Enemy(t, px + Math.cos(a) * R, py + Math.sin(a) * R)); }
                catch (e) { ERR.push('spawn ' + t + ': ' + String(e && e.stack || e)); }
            });
            game.player.damageMul = 0;   // don't let auto-attacks kill the showcase ring
            frames = 22;                 // ~0.37s: spawn-pop settles, ring stays put
        }

        // Deterministic SYNCHRONOUS stepping: a virtual-time budget can cut off a
        // long rAF chain mid-run, so we step the sim in a tight loop instead (a
        // synchronous loop never yields, so the budget can't interrupt it). Paused
        // overlays (level-up / chest / shrine) are auto-dismissed so the sim keeps
        // advancing to a real swarm instead of freezing on the first level-up.
        for (let i = 0; i < frames; i++) {
            try {
                game.update(DT);
                if (game.upgradeChoices && game.selectUpgrade) game.selectUpgrade(0);
                if (game.chestReward && game._dismissChestReward) game._dismissChestReward();
                if (game.altar && game.selectAltar) game.selectAltar(0);
                if (game.victory) break;
            } catch (e) {
                ERR.push('frame ' + i + ': ' + String(e && e.stack || e));
                break;
            }
        }
        // Teleport for close-ups (buildings live far from spawn), then settle
        // a few frames so the camera catches up before the final render.
        const TP = params.get('tp');
        if (TP) {
            try {
                if (TP === 'building' || TP === 'buildingInside' || TP === 'buildingExterior') {
                    const floors = game.obstacleSystem.obstacles.filter((o) => o.type === 'buildingFloor');
                    const b = TP === 'buildingExterior'
                        ? floors.find((o) => o.def.styleType !== 'ruin') || floors[0]
                        : floors[0];
                    if (b) {
                        if (TP === 'buildingExterior') {
                            // Frame the whole landmark clear of the HUD while
                            // keeping the player nearby for a useful scale cue.
                            game.player.x = b.x - 500;
                            game.player.y = b.y + 20;
                        } else {
                            game.player.x = b.x;
                            game.player.y = TP === 'buildingInside' ? b.y : b.y + 240;
                        }
                    }
                } else if (TP === 'vigilSite' || TP === 'vigilBeacon' || TP === 'vigilBeaconCleared') {
                    const sites = game.vigilSiteSystem?.sites || [];
                    const beaconShot = TP === 'vigilBeacon' || TP === 'vigilBeaconCleared';
                    const wanted = beaconShot ? 'beacon' : 'archive';
                    const site = sites.find((candidate) => candidate.archetype === wanted)
                        || sites.find((candidate) => beaconShot
                            ? candidate.archetype === 'beacon'
                            : candidate.archetype !== 'hearth' && candidate.archetype !== 'beacon')
                        || sites[0];
                    if (!site) throw new Error('requested Living Vigil site was not placed');
                    game.player.x = site.x;
                    game.player.y = site.y;
                    // Keep the staged challenge legible while its activation
                    // and world/HUD announcements settle into the final frame.
                    if (beaconShot) {
                        game.player.damageMul = 0;
                        game.player.hp = Math.max(game.player.hp, game.player.maxHp);
                    }
                    const dwellFrames = Math.ceil(((site.def?.dwellSeconds || 0.8) + 0.22) / DT);
                    for (let i = 0; i < dwellFrames; i++) {
                        game.update(DT);
                        if (game.upgradeChoices && game.selectUpgrade) game.selectUpgrade(0);
                    }
                    if (TP === 'vigilBeaconCleared') {
                        for (const guardian of site.guardianRefs || []) guardian.active = false;
                        game.update(DT);
                        if (game.upgradeChoices && game.selectUpgrade) game.selectUpgrade(0);
                    }
                } else {
                    const [tx, ty] = TP.split(',').map(Number);
                    if (Number.isFinite(tx) && Number.isFinite(ty)) { game.player.x = tx; game.player.y = ty; }
                }
                for (let i = 0; i < 30; i++) game.update(DT);
            } catch (e) { ERR.push('tp: ' + String(e && e.stack || e)); }
        }
        // ── Adaptive-quality QA scenarios (roadmap #5) — spawn a stress frame ──
        try {
            const px = game.player.x, py = game.player.y;
            const rng = (i, n, r) => { const a = -Math.PI / 2 + i * (2 * Math.PI / n); return [px + Math.cos(a) * r, py + Math.sin(a) * r]; };
            if (DENSE) {
                const types = ['slime', 'bat', 'crawler', 'spitter', 'mite', 'brute'];
                for (let i = 0; i < DENSE; i++) {
                    const [x, y] = rng(i, DENSE, 140 + (i % 5) * 60);
                    game.enemies.push(new Enemy(types[i % types.length], x, y));
                }
                game.player.damageMul = 0;   // keep the swarm alive for the shot
            }
            if (PICKUPS) {
                const tiers = ['small', 'medium', 'large'];
                for (let i = 0; i < PICKUPS; i++) {
                    const [x, y] = rng(i, PICKUPS, 90 + (i % 6) * 45);
                    if (i % 4 === 3) game.coins.push(new Coin(x, y, 1));
                    else if (i % 7 === 6) game.healthOrbs.push(new HealthOrb(x, y));
                    else game.gems.push(new XPGem(x, y, tiers[i % 3]));

                game._spawnBoss(id);
                for (let i = game.enemies.length - 1; i >= 0; i--) {
                    const candidate = game.enemies[i];
                    if (candidate.active && candidate.boss && candidate.type === id) { stagedBoss = candidate; break; }
                }
                // Keep choreography screenshots deterministic and readable.
                // Runtime bosses still use the real arena spawn; this QA-only
                // placement prevents a random angle from putting the staged
                // cast, ground tell, or recovery pose just outside the frame.
                if (stagedBoss) {

                        game.player.x + 360,
                        game.player.y - 40,
                        (stagedBoss.radius || 90) + 8,

                    stagedBoss.x = spot.x;
                    stagedBoss.y = spot.y;

                if (stagedBoss && Number.isFinite(QABOSSHP)) {

                    stagedBoss.hp = stagedBoss.maxHp * hpFraction;

                    const attack = stagedBoss.def.attacks?.find((a) => a.id === QABOSSATTACK);
                    if (attack) stagedBoss.bossForcedAttack = attack;
                    else ERR.push(`bossattack: '${QABOSSATTACK}' is not in ${id}'s kit`);
                }

                const settleFrames = QABOSS ? QABOSSFRAMES : 12;
                for (let i = 0; i < settleFrames; i++) {   // brief settle so lights/positions land

                    if (game.upgradeChoices && game.selectUpgrade) game.selectUpgrade(0);
                }

                    stagedBoss.hp = 0;
                    stagedBoss.active = false;

                for (let i = 0; i < DMGNUM; i++) {
                    const [x, y] = rng(i, DMGNUM, 60 + (i % 8) * 30);
                    game.damageNumbers.push(new DamageNumber(x, y, 10 + (i * 7) % 90, cols[i % cols.length]));

            }

        if (VEILSCALE != null && game.lighting && game.lighting.setQuality) {

        }

        if (PROFILE > 0 && game.profiler) {

                    bossKill: QABOSSKILL,
                    gfxtier: GFXTIER, map: MAP || null },
                dpr: (renderer && renderer.dpr) || null,
                veilScale: (game.lighting && game.lighting.veilScale != null) ? game.lighting.veilScale : null,
                counts: {

                    projectiles: game.projectiles ? game.projectiles.length : -1,
                    projectilePoolAll: (game.projectilePool && game.projectilePool._all) ? game.projectilePool._all.length : -1,
                    particles: (game.particles && game.particles.activeCount) ? game.particles.activeCount() : -1,
                    gems: game.gems ? game.gems.length : -1,
                    coins: game.coins ? game.coins.length : -1,
                    hazards: game.hazards ? game.hazards.length : -1,
                    lights: (game.lighting && game.lighting._count != null) ? game.lighting._count : -1,
                    tintBlits: (game.lighting && game.lighting.tints) ? Math.floor(game.lighting.tints.length / 5) : -1,

                exc: ERR.length,
                firstErr: ERR.length ? ERR[0].slice(0, 200) : null,
            };

            // has no server, and a Playwright driver reads window.__profile directly).
            if (location.protocol !== 'file:') {

                    await fetch('/__save/profile-' + PROFTAG + '.json', {
                        method: 'PUT',
                        body: JSON.stringify(result, null, 2),

                } catch (e) { ERR.push('profile-save: ' + String(e)); }
            }
        }
        if (QA_STATUSES === 'all') {
            try {
                // Stage after every simulation/profiling update so timers stay
                // exact in the final frame. Replacing the visual enemy list is
                // harness-only and keeps all seven non-color glyphs readable.
                const enemy = new Enemy('brute', game.player.x + 180, game.player.y + 80);
                enemy.spawnAge = 1;
                enemy.speed = 0;
                enemy.hp = enemy.maxHp * 0.68;
                // Important enemies retain the complete seven-cue vocabulary;
                // trash swarms intentionally cap visible badges for legibility.
                enemy.encounterGuardian = true;
                enemy.shieldTimer = 120;
                enemy.slowTimer = 120;
                enemy.shredTimer = 120;
                enemy.shredStacks = 4;
                enemy.chillTimer = 120;
                enemy.chillStacks = 5;
                enemy.freezeTimer = 120;
                enemy.burnTimer = 120;
                enemy.shockTimer = 120;
                enemy.shockStacks = 7;
                game.enemies = [enemy];
                qaStatusEnemy = enemy;
            } catch (e) { ERR.push('statuses: ' + String(e && e.stack || e)); }
        }
        game.render();
    }

    // Caption fixtures are staged after simulation so the final render captures
    // the production lane at age zero. They intentionally use the public API;
    // filtered fixtures therefore fail their receipt instead of forcing pixels.
    if (QA_CAPTION === 'voice') {
        game.captionSystem.say({
            key: 'qa-voice', speaker: 'Solnakh', text: 'Only embers remain.', lifetime: 6,
        });
        game.captionSystem.update(1);
        game.render();
    } else if (QA_CAPTION === 'danger') {
        game.captionSystem.sound({
            key: 'qa-danger', text: 'Apex blast charging nearby', detail: 'full', lifetime: 6,
        });
        game.captionSystem.update(1);
        game.render();
    }

    // Verify every requested QA branch against production-owned state before
    // stamping the frame/title. This makes EXC:0 a receipt assertion, not only
    // an exception smoke: a query that silently stops staging its requested
    // modality, focus, preferences, showcase, or Mines cell now fails both
    // local and CI runs.
    const allStatusTimersActive = !!qaStatusEnemy
        && qaStatusEnemy.shieldTimer > 0
        && qaStatusEnemy.slowTimer > 0
        && qaStatusEnemy.shredTimer > 0
        && qaStatusEnemy.chillTimer > 0
        && qaStatusEnemy.freezeTimer > 0
        && qaStatusEnemy.burnTimer > 0
        && qaStatusEnemy.shockTimer > 0;
    const requiredDevControls = [
        ['toggleSetting', 'debug'],
        ['toggleSetting', 'unlockMaps'],
        ['cheatCoins', 1000],
        ['cheatCoins', 10000],
        ['cheatUnlockAll', null],
    ];
    const menuHotspots = game.ui?.menu?.hotspots || [];
    const devControlCount = requiredDevControls.filter(([action, arg]) => menuHotspots.some(
        (hotspot) => hotspot.action === action && hotspot.arg === arg,
    )).length;
    const qaState = {
        inputModality: input.getModality(),
        menuFocusKey: game.menuFocusKey || null,
        menuFocusVisible: game.screen === 'start'
            && input.getModality() === 'keyboard'
            && !!game.menuFocusKey,
        reducedEffects: game.saveSystem.getSetting('reducedEffects') === true,
        uiScale: game.saveSystem.getSetting('uiScale'),
        highContrast: game.saveSystem.getSetting('highContrast') === true,
        captions: game.saveSystem.getSetting('captions') === true,
        captionDetail: game.saveSystem.getSetting('captionDetail'),
        monoAudio: game.saveSystem.getSetting('monoAudio') === true,
        voiceVolume: Math.round((game.saveSystem.getSetting('volVoice') || 0) * 100),
        vibration: game.saveSystem.getSetting('vibration'),
        runtimeCaptions: game.captionSystem.enabled === true,
        runtimeCaptionDetail: game.captionSystem.detail,
        runtimeMonoAudio: game.audio.monoAudio === true,
        runtimeVoiceVolume: Math.round((game.audio.volVoice || 0) * 100),
        runtimeVibration: game.haptics.strength,
        outputChannels: game.audio.outputBus?.channelCount ?? null,
        vibrationSupported: game.haptics.supported(),
        captionKey: game.captionSystem.snapshot()?.key || '',
        captionKind: game.captionSystem.snapshot()?.kind || '',
        captionText: game.captionSystem.snapshot()?.text || '',
        hapticEvents: qaHapticEvents.join(','),
        devControls: devControlCount,
        settingsPane: game.settingsPane === 'accessibility' ? 'accessibility' : 'general',
        statuses: allStatusTimersActive ? 'all' : '',
        minesFocusIndex: game.minigame?.mines ? game.minesFocusIndex : null,
    };
    if (ACTIVE_INPUT_MODE && qaState.inputModality !== ACTIVE_INPUT_MODE) {
        ERR.push(`receipt: input expected '${ACTIVE_INPUT_MODE}', got '${qaState.inputModality}'`);
    }
    if (REDUCED && !qaState.reducedEffects) {
        ERR.push('receipt: reduced=1 did not persist Reduced Effects');
    }
    if (QA_UI_SCALE != null && qaState.uiScale !== QA_UI_SCALE) {
        ERR.push(`receipt: uiscale expected ${QA_UI_SCALE}, got ${qaState.uiScale}`);
    }
    if (QA_HIGH_CONTRAST != null && qaState.highContrast !== QA_HIGH_CONTRAST) {
        ERR.push(`receipt: contrast expected ${QA_HIGH_CONTRAST}, got ${qaState.highContrast}`);
    }
    if (QA_CAPTIONS != null && qaState.captions !== QA_CAPTIONS) {
        ERR.push(`receipt: captions expected ${QA_CAPTIONS}, got ${qaState.captions}`);
    }
    if (QA_CAPTIONS != null && qaState.runtimeCaptions !== QA_CAPTIONS) {
        ERR.push(`receipt: runtime captions expected ${QA_CAPTIONS}, got ${qaState.runtimeCaptions}`);
    }
    if (QA_CAPTION_DETAIL && qaState.captionDetail !== QA_CAPTION_DETAIL) {
        ERR.push(`receipt: captiondetail expected '${QA_CAPTION_DETAIL}', got '${qaState.captionDetail}'`);
    }
    if (QA_CAPTION_DETAIL && qaState.runtimeCaptionDetail !== QA_CAPTION_DETAIL) {
        ERR.push(`receipt: runtime captiondetail expected '${QA_CAPTION_DETAIL}', got '${qaState.runtimeCaptionDetail}'`);
    }
    if (QA_MONO != null && qaState.monoAudio !== QA_MONO) {
        ERR.push(`receipt: mono expected ${QA_MONO}, got ${qaState.monoAudio}`);
    }
    if (QA_MONO != null && qaState.runtimeMonoAudio !== QA_MONO) {
        ERR.push(`receipt: runtime mono expected ${QA_MONO}, got ${qaState.runtimeMonoAudio}`);
    }
    if (QA_VOICE_VOLUME != null && qaState.voiceVolume !== QA_VOICE_VOLUME) {
        ERR.push(`receipt: voicevol expected ${QA_VOICE_VOLUME}, got ${qaState.voiceVolume}`);
    }
    if (QA_VOICE_VOLUME != null && qaState.runtimeVoiceVolume !== QA_VOICE_VOLUME) {
        ERR.push(`receipt: runtime voicevol expected ${QA_VOICE_VOLUME}, got ${qaState.runtimeVoiceVolume}`);
    }
    if (QA_VIBRATION && qaState.vibration !== QA_VIBRATION) {
        ERR.push(`receipt: vibration expected '${QA_VIBRATION}', got '${qaState.vibration}'`);
    }
    if (QA_VIBRATION && qaState.runtimeVibration !== QA_VIBRATION) {
        ERR.push(`receipt: runtime vibration expected '${QA_VIBRATION}', got '${qaState.runtimeVibration}'`);
    }
    if (QA_VIBRATION_CAP != null && qaState.vibrationSupported !== QA_VIBRATION_CAP) {
        ERR.push(`receipt: vibrationcap expected ${QA_VIBRATION_CAP}, got ${qaState.vibrationSupported}`);
    }
    if (QA_CAPTION && qaState.captionKey !== `qa-${QA_CAPTION}`) {
        ERR.push(`receipt: caption expected 'qa-${QA_CAPTION}', got '${qaState.captionKey}'`);
    }
    if (QA_BOSS_WARNING && qaState.captionKey !== 'boss-warning-stormwingAlpha') {
        ERR.push(`receipt: bosswarning did not emit the production caption (got '${qaState.captionKey}')`);
    }
    if (QA_BOSS_WARNING && !qaHapticEvents.includes('bossWarning')) {
        ERR.push('receipt: bosswarning did not request its production haptic cue');
    }

        ERR.push(`receipt: dev=1 expected ${requiredDevControls.length} Settings controls, got ${qaState.devControls}`);
    }
    if (QA_SETTINGS_PANE && qaState.settingsPane !== QA_SETTINGS_PANE) {
        ERR.push(`receipt: settingspane expected '${QA_SETTINGS_PANE}', got '${qaState.settingsPane}'`);
    }
    if (QA_STATUSES === 'all' && qaState.statuses !== 'all') {
        ERR.push('receipt: statuses=all did not stage all seven combat statuses');
    }
    if (MENU_FOCUS && qaExpectedMenuFocusKey && qaState.menuFocusKey !== qaExpectedMenuFocusKey) {
        ERR.push(`receipt: focus expected '${qaExpectedMenuFocusKey}', got '${qaState.menuFocusKey || ''}'`);
    }
    if (MENU_FOCUS && ACTIVE_INPUT_MODE === 'keyboard' && !qaState.menuFocusVisible) {
        ERR.push('receipt: keyboard menu focus is not visible');
    }
    if (MINES_FOCUS != null && qaState.minesFocusIndex !== MINES_FOCUS) {
        ERR.push(`receipt: Mines focus expected ${MINES_FOCUS}, got ${qaState.minesFocusIndex}`);
    }

    if (BADGE) {
        const ctx = renderer.ctx;
        ctx.setTransform(1, 0, 0, 1, 0, 0);

        ctx.textBaseline = 'top';

    }

    // Mirror the receipt into inert DOM data so constrained browser drivers can

    const qaRoot = document.documentElement;
    qaRoot.dataset.qaInput = window.__qaState.inputModality;
    qaRoot.dataset.qaFocus = window.__qaState.menuFocusKey || '';
    qaRoot.dataset.qaFocusVisible = String(window.__qaState.menuFocusVisible);
    qaRoot.dataset.qaReduced = String(window.__qaState.reducedEffects);
    qaRoot.dataset.qaUiScale = String(window.__qaState.uiScale);
    qaRoot.dataset.qaHighContrast = String(window.__qaState.highContrast);
    qaRoot.dataset.qaCaptions = String(window.__qaState.captions);
    qaRoot.dataset.qaCaptionDetail = window.__qaState.captionDetail;
    qaRoot.dataset.qaMono = String(window.__qaState.monoAudio);
    qaRoot.dataset.qaVoiceVolume = String(window.__qaState.voiceVolume);
    qaRoot.dataset.qaVibration = window.__qaState.vibration;
    qaRoot.dataset.qaRuntimeCaptions = String(window.__qaState.runtimeCaptions);
    qaRoot.dataset.qaRuntimeCaptionDetail = window.__qaState.runtimeCaptionDetail;
    qaRoot.dataset.qaRuntimeMono = String(window.__qaState.runtimeMonoAudio);
    qaRoot.dataset.qaRuntimeVoiceVolume = String(window.__qaState.runtimeVoiceVolume);
    qaRoot.dataset.qaRuntimeVibration = window.__qaState.runtimeVibration;
    qaRoot.dataset.qaOutputChannels = window.__qaState.outputChannels == null
        ? ''
        : String(window.__qaState.outputChannels);
    qaRoot.dataset.qaVibrationSupported = String(window.__qaState.vibrationSupported);
    qaRoot.dataset.qaCaptionKey = window.__qaState.captionKey;
    qaRoot.dataset.qaCaptionKind = window.__qaState.captionKind;
    qaRoot.dataset.qaCaptionText = window.__qaState.captionText;
    qaRoot.dataset.qaHapticEvents = window.__qaState.hapticEvents;
    qaRoot.dataset.qaDevControls = String(window.__qaState.devControls);
    qaRoot.dataset.qaSettingsPane = window.__qaState.settingsPane;
    qaRoot.dataset.qaStatuses = window.__qaState.statuses;
    qaRoot.dataset.qaMinesFocus = window.__qaState.minesFocusIndex == null
        ? ''
        : String(window.__qaState.minesFocusIndex);
    qaRoot.dataset.qaErrorKeys = [...new Set(ERR.map((entry) => String(entry).split(':', 1)[0]))]
        .sort()
        .join(',');
    qaRoot.dataset.qaReady = '1';
    document.title = 'DONE EXC:' + ERR.length + ' enemies:' + (game.enemies ? game.enemies.length : -1) +
        ' map:' + (game._obstacleBiome || 'unknown') + qaBossSummary
        + (ERR.length ? ' error:' + ERR[0].slice(0, 320).replace(/\s+/g, ' ') : '');
    window.__done = true;
}

boot().catch((e) => {
    const message = 'boot: ' + String(e && e.stack || e);
    ERR.push(message);
    window.__bootError = message;
    console.error(message);
    document.title = 'BOOTFAIL ' + message.slice(0, 120);
});
</script>
</body>
</html>
