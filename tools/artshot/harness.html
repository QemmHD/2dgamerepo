<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EMBERWAKE art harness</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
  /* Mirror the shipped stage centering. Cover-fit phone canvases are taller
     than the viewport; without flex centering the harness crops only the foot
     while Renderer.safeArea correctly assumes an even top/bottom crop. */
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
</style>
</head>
<body>
<!--
  Headless art-screenshot harness (dev tooling — NOT deployed; Pages ships src/).
  Boots the real Game.js, starts a run, steps the sim synchronously to a chosen
  game-time, then renders one frame for a screenshot. Used by the higgsfield
  AI-art loop (screenshot -> Nano Banana 2 improve -> implement -> verify).

  Serve the repo ROOT with tools/artshot/serve.py, then screenshot:
    chrome --headless=new --no-sandbox --disable-gpu --hide-scrollbars \
      --mute-audio --autoplay-policy=no-user-gesture-required \
      --disable-background-networking --disable-component-update \
      --force-device-scale-factor=1 --window-size=1600,900 \
      --virtual-time-budget=12000 --user-data-dir=<tmp> --screenshot=<out.png> \
      "http://127.0.0.1:PORT/tools/artshot/harness.html?seconds=35"

  Query params:
    seconds  game-time to simulate before the shot (default 12)
    badge    "1" stamps an EXC:<n> exception-count badge top-left (self-check)
    screen   "menu" to shoot the main menu instead of a run; with tab=<name>
    input    active input convention: "keyboard", "pointer", or "touch"
             (legacy touch=1 still forces touch and takes precedence)
    focus    current menu hotspot key (encode # as %23), or an action fallback
    reduced "1" persists Reduced Effects before staging the requested frame
    uiscale  Combat HUD size: "100", "115", or "130"
    contrast high-contrast combat cues: "1" on or "0" off
    settingspane  Settings sub-pane: "general" or "accessibility" (menu only)
    dev      "1" keeps the shipped developer Settings controls visible
    resetprofile "1" clears the local QA profile before boot
    campaignbosses comma-separated boss ids, or map:boss ids, to seed the exact
             campaign ledger before a menu shot; mapbypass "1" enables QA access
    captions "1" on or "0" off; captiondetail "essential" or "full"
    mono     mono audio output: "1" on or "0" off
    voicevol independent voice volume: 0..100 in ten-point increments
    vibration saved touch-vibration strength: "off", "low", or "full"
    vibrationcap force the QA capability receipt: "1" available or "0" unavailable
    caption  stage a gameplay caption fixture: "voice" or "danger" (run only)
    bosswarning "1" stages the real Emberwood boss-warning integration (run only)
    statuses "all" stages all seven combat-status cues on one enemy (run only)
    pause    "1" opens the production pause overlay after all run fixtures
    gameover "1" settles the staged run through the production death summary
    victory  "1" opens the production victory choice after run fixtures
    bpxp / bpclaimthrough / bpreceipt  seed Battle-Pass QA states (menu only)
    mines=<preset> / minessafe=<n>  stage an honest Mines quote (menu only)
    minesFocus=<0..24>  select a Mines tile for keyboard-focus visual QA
    tryset=<set id>  stage a known cosmetic set in the Boutique fitting room
    collectioncat=<category>  stage a Collection category (character menu only)
    collectionpage=<n>  stage an exact positive Collection page (character menu only)
    pursuit=<set id>  stage a known tracked set in Collection (character menu only)
    completion=<overview|sets|sources|blueprint|case>  open Collection Completion
    blueprint=<id>  select one of the two authored Mythic Blueprints
    completionfixture=gravebell4  own Gravebell's four non-Blueprint pieces
    wallet=<n>  stage an exact earned-coin balance for Completion QA
    blueprintbuy=1  perform the production two-press Blueprint confirmation/purchase
    boss=1 / bossid=<id> / bosshp=<0..1> / bossattack=<move id> / bosskill=1
             spawn a live apex directly and stage its choreography state
    tp       teleport before the shot: "building" (just south of the first
             placed building), "buildingInside" (inside its cutaway),
             "buildingExterior" (offset view of the first intact house),
             "vigilSite" (stage a non-combat Living Vigil discovery),
             "vigilBeacon" (kindle a guardian challenge),
             "vigilBeaconCleared" (stage its earned receipt), or "x,y" coords
    skipOnboarding  forced to "1" here (deterministic frames); pass "=0"
             explicitly to shoot the guided-first-run hint pill itself
-->
<div id="stage"><canvas id="game" aria-describedby="game-instructions game-objective"></canvas></div>
<p id="game-instructions" class="sr-only">Press O to hear the current Run Path task.</p>
<p id="game-objective" class="sr-only"></p>
<div id="game-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<script>
// Deterministic frames: force ?skipOnboarding=1 unless the URL sets it
// explicitly. A fresh headless profile has runs === 0, which would otherwise
// arm the guided-first-run hints and draw the "Move — WASD..." pill over
// showcase/visual-diff shots. Classic script so it runs BEFORE the module
// below — GameConfig.js reads location.search at import time.
if (!/[?&]skipOnboarding=/.test(location.search)) {
    const q = location.search ? location.search + '&' : '?';
    history.replaceState(null, '', location.pathname + q + 'skipOnboarding=1' + location.hash);
}
</script>
<script type="module">
// Neutralize WebAudio: a live real-time AudioContext keeps the renderer's event
// loop busy and prevents --virtual-time-budget from fast-forwarding (the page
// hangs). AudioSystem feature-detects window.AudioContext at runtime and no-ops
// cleanly when it's absent, so gameplay/visuals are unaffected.
window.AudioContext = undefined;
window.webkitAudioContext = undefined;

import { Renderer } from '../../src/systems/Renderer.js';
import { GameLoop } from '../../src/core/GameLoop.js';
import { Game } from '../../src/core/Game.js';
import { SaveSystem } from '../../src/systems/SaveSystem.js';
import { Input } from '../../src/core/Input.js';
import { KeyboardInput } from '../../src/core/KeyboardInput.js';
import { TouchJoystick } from '../../src/core/TouchJoystick.js';
import { TouchButtons } from '../../src/core/TouchButtons.js';
import { prewarmSprites, getGlowSprite } from '../../src/assets/ProceduralSprites.js';
import { loadLpcSprites } from '../../src/assets/LpcSprites.js';
import { loadWorldTextures } from '../../src/assets/WorldTextures.js';
import { loadIconGlyphs } from '../../src/assets/CustomIcons.js';
import { loadMonsterSprites } from '../../src/assets/MonsterSprites.js';
import { loadEnemyAiSprites } from '../../src/assets/EnemySprites.js';
import { loadHeroAiSprites } from '../../src/assets/HeroAiSprites.js';
import { clearHeroFrameCache, clearDecorationCache } from '../../src/assets/ProceduralSprites.js';
import { loadObstacleSprites } from '../../src/assets/ObstacleSprites.js';
import { loadDecorSprites } from '../../src/assets/DecorSprites.js';
import { loadRenderedProps } from '../../src/assets/RenderedWeaponProps.js';
import { getMenuImages } from '../../src/assets/MenuImages.js';
import { PASS_COSMETIC_MILESTONES, bpProgress } from '../../src/content/battlePass.js';
import {
    COSMETICS,
    COSMETIC_CATEGORIES,
    COSMETIC_SETS,
    COSMETIC_BLUEPRINT_IDS,
    cosmeticsByCategory,
} from '../../src/content/cosmetics.js';
import { Enemy } from '../../src/entities/Enemy.js';
import { XPGem } from '../../src/entities/XPGem.js';
import { Coin } from '../../src/entities/Coin.js';
import { HealthOrb } from '../../src/entities/HealthOrb.js';
import { DamageNumber } from '../../src/entities/DamageNumber.js';
import { WEAPON_AURA } from '../../src/content/weapons.js';
import { photoFilterIndexById } from '../../src/content/photoFilters.js';
import { isPhoneLandscapeViewport } from '../../src/systems/ResponsiveLayout.js';

const ERR = [];
window.__ERR = ERR;
window.addEventListener('error', (e) => ERR.push(String(e.message || e.error || e)));
window.addEventListener('unhandledrejection', (e) => ERR.push('promise: ' + String(e.reason)));

const params = new URLSearchParams(location.search);
const SECONDS = parseFloat(params.get('seconds') || '12');
const BADGE = params.get('badge') === '1';
const SCREEN = params.get('screen') || 'run';   // 'run' | 'menu'
const TAB = params.get('tab') || 'play';
const TRY_SET_REQUEST = params.get('tryset');
const QA_TRY_SET = TRY_SET_REQUEST
    ? COSMETIC_SETS.find((set) => set.id === TRY_SET_REQUEST) ?? null
    : null;
const COLLECTION_CATEGORY_REQUEST = params.get('collectioncat');
const QA_COLLECTION_CATEGORY = COLLECTION_CATEGORY_REQUEST
    && COSMETIC_CATEGORIES.includes(COLLECTION_CATEGORY_REQUEST)
    ? COLLECTION_CATEGORY_REQUEST
    : null;
const COLLECTION_PAGE_REQUEST = params.get('collectionpage');
const QA_COLLECTION_PAGE = COLLECTION_PAGE_REQUEST != null && /^[1-9]\d*$/.test(COLLECTION_PAGE_REQUEST)
    ? Number(COLLECTION_PAGE_REQUEST)
    : null;
const PURSUIT_SET_REQUEST = params.get('pursuit');
const QA_PURSUIT_SET = PURSUIT_SET_REQUEST
    ? COSMETIC_SETS.find((set) => set.id === PURSUIT_SET_REQUEST) ?? null
    : null;
const COMPLETION_REQUEST = params.has('completion') ? params.get('completion') : null;
const QA_COMPLETION_SECTION = ['overview', 'sets', 'sources', 'blueprint', 'case']
    .includes(COMPLETION_REQUEST) ? COMPLETION_REQUEST : null;
const BLUEPRINT_REQUEST = params.has('blueprint') ? params.get('blueprint') : null;
const QA_BLUEPRINT_ID = COSMETIC_BLUEPRINT_IDS.includes(BLUEPRINT_REQUEST)
    ? BLUEPRINT_REQUEST : null;
const COMPLETION_FIXTURE_REQUEST = params.has('completionfixture')
    ? params.get('completionfixture') : null;
const QA_COMPLETION_FIXTURE = COMPLETION_FIXTURE_REQUEST === 'gravebell4'
    ? COMPLETION_FIXTURE_REQUEST : null;
const WALLET_REQUEST = params.has('wallet') ? params.get('wallet') : null;
const QA_WALLET = WALLET_REQUEST != null && /^(0|[1-9]\d*)$/.test(WALLET_REQUEST)
    && Number.isSafeInteger(Number(WALLET_REQUEST))
    ? Number(WALLET_REQUEST) : null;
const BLUEPRINT_BUY_REQUEST = params.has('blueprintbuy') ? params.get('blueprintbuy') : null;
const QA_BLUEPRINT_BUY = BLUEPRINT_BUY_REQUEST === '1';
const QA_DEV = params.get('dev') === '1';
const RESET_PROFILE = params.get('resetprofile') === '1';
const CAMPAIGN_BOSS_REQUEST = params.get('campaignbosses');
const CAMPAIGN_BOSS_TOKENS = CAMPAIGN_BOSS_REQUEST == null
    ? []
    : CAMPAIGN_BOSS_REQUEST.split(',').map((value) => value.trim()).filter(Boolean);
const MAP_BYPASS_REQUEST = params.has('mapbypass') ? params.get('mapbypass') : null;
const QA_MAP_BYPASS = MAP_BYPASS_REQUEST === '1';
const LOCAL_QA_ORIGIN = location.hostname === 'localhost'
    || location.hostname === '127.0.0.1'
    || location.hostname === '[::1]';
const OUT = params.get('out');
// showcase="1" (all) or a csv of enemy types → spawn a ring of them around the
// player and shoot after a short settle, so a verification frame shows the exact
// sprites regardless of when they'd naturally spawn.
const SHOWCASE = params.get('showcase');
// EMBERGLASS Keeper's Lens: ?photo=1 enters photo mode after the sim settles,
// ?photozoom=<z> sets the zoom (0.75–2.0) for veil-alignment screenshots.
const PHOTO = params.get('photo') === '1';
const PHOTOZOOM = parseFloat(params.get('photozoom') || '1');
const PHOTOFILTER = params.get('filter');   // filter id (e.g. 'gloam'); default none
// Adaptive-quality QA (roadmap #5 visual pass). gfxtier forces a governor tier
// for the final frame; debughud shows the GFXTIER/profiler readout; the scenario
// knobs spawn a stress frame. All QA-only — no shipped gameplay is touched.
const GFXTIER = params.has('gfxtier') ? parseInt(params.get('gfxtier'), 10) : null;
const DEBUGHUD = params.get('debughud') === '1';
const DENSE = parseInt(params.get('dense') || '0', 10);      // extra enemies
const PICKUPS = parseInt(params.get('pickups') || '0', 10);  // gems + coins + orbs
const DMGNUM = parseInt(params.get('dmgnum') || '0', 10);    // floating damage numbers
const QABOSSID = params.get('bossid');
const QABOSS = params.get('boss') === '1' || !!QABOSSID;    // spawn a live boss directly
const QABOSSHP = params.has('bosshp') ? parseFloat(params.get('bosshp')) : null;
const QABOSSATTACK = params.get('bossattack');
const QABOSSFRAMES = Math.max(1, parseInt(params.get('bossframes') || '12', 10) || 12);
const QABOSSKILL = params.get('bosskill') === '1';
const MAP = params.get('map');                               // force selected map (weather)
const INPUT_REQUEST = params.get('input');
const INPUT_MODE = ['keyboard', 'pointer', 'touch'].includes(INPUT_REQUEST)
    ? INPUT_REQUEST
    : null;
const MENU_FOCUS = (params.get('focus') || '').trim();
const REDUCED = params.get('reduced') === '1';
const UI_SCALE_REQUEST = params.has('uiscale') ? params.get('uiscale') : null;
const QA_UI_SCALE = ['100', '115', '130'].includes(UI_SCALE_REQUEST)
    ? Number(UI_SCALE_REQUEST)
    : null;
const CONTRAST_REQUEST = params.has('contrast') ? params.get('contrast') : null;
const QA_HIGH_CONTRAST = CONTRAST_REQUEST === '1'
    ? true
    : CONTRAST_REQUEST === '0'
        ? false
        : null;
const SETTINGS_PANE_REQUEST = params.has('settingspane') ? params.get('settingspane') : null;
const QA_SETTINGS_PANE = ['general', 'accessibility'].includes(SETTINGS_PANE_REQUEST)
    ? SETTINGS_PANE_REQUEST
    : null;
const CHARACTER_PANE_REQUEST = params.has('characterpane') ? params.get('characterpane') : null;
const QA_CHARACTER_PANE = ['collection', 'rites'].includes(CHARACTER_PANE_REQUEST)
    ? CHARACTER_PANE_REQUEST
    : null;
const CAPTIONS_REQUEST = params.has('captions') ? params.get('captions') : null;
const QA_CAPTIONS = CAPTIONS_REQUEST === '1'
    ? true
    : CAPTIONS_REQUEST === '0'
        ? false
        : null;
const CAPTION_DETAIL_REQUEST = params.has('captiondetail') ? params.get('captiondetail') : null;
const QA_CAPTION_DETAIL = ['essential', 'full'].includes(CAPTION_DETAIL_REQUEST)
    ? CAPTION_DETAIL_REQUEST
    : null;
const MONO_REQUEST = params.has('mono') ? params.get('mono') : null;
const QA_MONO = MONO_REQUEST === '1'
    ? true
    : MONO_REQUEST === '0'
        ? false
        : null;
const VOICE_VOLUME_REQUEST = params.has('voicevol') ? params.get('voicevol') : null;
const VOICE_VOLUME_PRESETS = Array.from({ length: 11 }, (_, index) => String(index * 10));
const QA_VOICE_VOLUME = VOICE_VOLUME_PRESETS.includes(VOICE_VOLUME_REQUEST)
    ? Number(VOICE_VOLUME_REQUEST)
    : null;
const VIBRATION_REQUEST = params.has('vibration') ? params.get('vibration') : null;
const QA_VIBRATION = ['off', 'low', 'full'].includes(VIBRATION_REQUEST)
    ? VIBRATION_REQUEST
    : null;
const VIBRATION_CAP_REQUEST = params.has('vibrationcap') ? params.get('vibrationcap') : null;
const QA_VIBRATION_CAP = VIBRATION_CAP_REQUEST === '1'
    ? true
    : VIBRATION_CAP_REQUEST === '0'
        ? false
        : null;
const CAPTION_REQUEST = params.has('caption') ? params.get('caption') : null;
const QA_CAPTION = ['voice', 'danger'].includes(CAPTION_REQUEST) ? CAPTION_REQUEST : null;
const BOSS_WARNING_REQUEST = params.has('bosswarning') ? params.get('bosswarning') : null;
const QA_BOSS_WARNING = BOSS_WARNING_REQUEST === '1';
const STATUSES_REQUEST = params.has('statuses') ? params.get('statuses') : null;
const QA_STATUSES = STATUSES_REQUEST === 'all' ? 'all' : null;
const QA_PAUSED = params.get('pause') === '1';
const QA_GAME_OVER = params.get('gameover') === '1';
const QA_VICTORY = params.get('victory') === '1';
const RUN_MODE_REQUEST = params.get('runmode');
const RUN_MODES = ['standard', 'daily', 'rite-trial', 'boss-rush', 'weekly'];
const QA_RUN_MODE = RUN_MODES.includes(RUN_MODE_REQUEST)
    ? RUN_MODE_REQUEST
    : 'standard';
const OBJECTIVE_PHASE_REQUEST = params.get('objectivephase');
const OBJECTIVE_PHASES = ['orientation', 'tactic', 'climax'];
const QA_OBJECTIVE_PHASE = OBJECTIVE_PHASES.includes(OBJECTIVE_PHASE_REQUEST)
    ? OBJECTIVE_PHASE_REQUEST
    : null;
const OBJECTIVE_PROGRESS_RAW = params.get('objectiveprogress');
const OBJECTIVE_PROGRESS_REQUEST = params.has('objectiveprogress')
    ? Number(OBJECTIVE_PROGRESS_RAW)
    : 0.45;
const OBJECTIVE_PROGRESS_VALID = !params.has('objectiveprogress')
    || (String(OBJECTIVE_PROGRESS_RAW).trim() !== ''
        && Number.isFinite(OBJECTIVE_PROGRESS_REQUEST)
        && OBJECTIVE_PROGRESS_REQUEST >= 0 && OBJECTIVE_PROGRESS_REQUEST < 1);
const QA_OBJECTIVE_PROGRESS = OBJECTIVE_PROGRESS_VALID
    ? OBJECTIVE_PROGRESS_REQUEST
    : 0.45;
let qaExpectedObjectiveProgress = null;
if (RUN_MODE_REQUEST != null && !RUN_MODES.includes(RUN_MODE_REQUEST)) {
    ERR.push(`param: invalid runmode '${RUN_MODE_REQUEST}'`);
}
if (OBJECTIVE_PHASE_REQUEST != null && !OBJECTIVE_PHASES.includes(OBJECTIVE_PHASE_REQUEST)) {
    ERR.push(`param: invalid objectivephase '${OBJECTIVE_PHASE_REQUEST}'`);
}
if (!OBJECTIVE_PROGRESS_VALID) ERR.push('param: invalid objectiveprogress');
for (const terminalParam of ['pause', 'gameover', 'victory']) {
    if (params.has(terminalParam) && !['0', '1'].includes(params.get(terminalParam))) {
        ERR.push(`param: invalid ${terminalParam}`);
    }
}
if ([QA_PAUSED, QA_GAME_OVER, QA_VICTORY].filter(Boolean).length > 1) {
    ERR.push('param: pause, gameover, and victory are mutually exclusive');
}
// Roadmap #6 profiling pass (tooling only). profile=<N> runs N measured frames
// with the FrameProfiler enabled, wrapping update()/render() so the top-level
// buckets (normally timed by GameLoop, which sync-stepping bypasses) populate,
// then PUTs game.profiler.ema + live counts to __out/profile-<proftag>.json.
// Off by default → the CI harness-smoke path is byte-for-byte unchanged.
const PROFILE = parseInt(params.get('profile') || '0', 10);
const PROFTAG = (params.get('proftag') || 'run').replace(/[^A-Za-z0-9._-]/g, '');
const VEILSCALE = params.has('veilscale') ? parseFloat(params.get('veilscale')) : null;
// touch=1 wires TouchButtons with supported forced on, so the touch-only HUD
// branches (action discs, lifted pips, hidden kindle bar) are verifiable
// headlessly — desktop Chromium never reports touch support on its own.
const FORCED_TOUCH = params.get('touch') === '1';
const TOUCH = FORCED_TOUCH || INPUT_MODE === 'touch';
// touch=1 is the historical forced-touch visual branch. Keep it authoritative
// even when a conflicting input= value is accidentally supplied.
const ACTIVE_INPUT_MODE = FORCED_TOUCH ? 'touch' : INPUT_MODE;
const BPXP = params.has('bpxp') ? Math.max(0, parseInt(params.get('bpxp'), 10) || 0) : null;
const BPCLAIMTHROUGH = Math.max(0, parseInt(params.get('bpclaimthrough') || '0', 10) || 0);
const BPRECEIPT = params.get('bpreceipt') === '1';
const MINESBET = params.has('mines') ? Number(params.get('mines')) : null;
const MINESSAFE = Math.max(0, Math.min(18, parseInt(params.get('minessafe') || '2', 10) || 0));
const MINES_FOCUS_REQUEST = params.get('minesFocus');
const MINES_FOCUS_PARSED = MINES_FOCUS_REQUEST == null ? null : Number(MINES_FOCUS_REQUEST);
const MINES_FOCUS = Number.isInteger(MINES_FOCUS_PARSED)
    && MINES_FOCUS_PARSED >= 0 && MINES_FOCUS_PARSED <= 24
    ? MINES_FOCUS_PARSED
    : null;
let qaBossSummary = '';
let qaExpectedMenuFocusKey = null;
let qaStatusEnemy = null;
let qaCampaignReceipts = [];
const qaHapticEvents = [];
const DT = 1 / 60;
const TOTAL_FRAMES = Math.round(SECONDS / DT);

async function boot() {
    const canvas = document.getElementById('game');
    const renderer = new Renderer(canvas);
    const keyboard = new KeyboardInput();
    const touch = new TouchJoystick(renderer);
    let buttons = null;
    if (TOUCH) { buttons = new TouchButtons(renderer); buttons.supported = true; }
    const input = new Input({ keyboard, touch, buttons });
    if (TOUCH) input.setModality('touch');

    let game;
    const loop = new GameLoop({ update: (dt) => game.update(dt), render: () => game.render() });

    prewarmSprites();
    for (const k in WEAPON_AURA) getGlowSprite(WEAPON_AURA[k].color);
    await Promise.all([loadLpcSprites(), loadWorldTextures(), loadIconGlyphs(), loadMonsterSprites(), loadEnemyAiSprites(),
        loadHeroAiSprites().then((ok) => { if (ok) clearHeroFrameCache(); }),
        loadObstacleSprites(),
        loadDecorSprites().then((ok) => { if (ok) clearDecorationCache(); }),
        loadRenderedProps()]);

    // Seed requested preferences through the production SaveSystem BEFORE Game
    // boots. The receipt therefore exercises the real cold-load wiring instead
    // of repairing subsystems manually after construction.
    if ((RESET_PROFILE || CAMPAIGN_BOSS_TOKENS.length || QA_MAP_BYPASS) && !LOCAL_QA_ORIGIN) {
        ERR.push('campaignqa: resetprofile, campaignbosses, and mapbypass are local-only');
    }
    if (RESET_PROFILE && LOCAL_QA_ORIGIN) {
        try { localStorage.removeItem('monkey-survivor:save:v1'); }
        catch (error) { ERR.push('resetprofile: ' + String(error)); }
    }
    const preferenceSeed = new SaveSystem();
    if (REDUCED) preferenceSeed.setSetting('reducedEffects', true);
    if (QA_UI_SCALE != null) preferenceSeed.setSetting('uiScale', QA_UI_SCALE);
    if (QA_HIGH_CONTRAST != null) preferenceSeed.setSetting('highContrast', QA_HIGH_CONTRAST);
    if (QA_CAPTIONS != null) preferenceSeed.setSetting('captions', QA_CAPTIONS);
    if (QA_CAPTION_DETAIL) preferenceSeed.setSetting('captionDetail', QA_CAPTION_DETAIL);
    if (QA_MONO != null) preferenceSeed.setSetting('monoAudio', QA_MONO);
    if (QA_VOICE_VOLUME != null) preferenceSeed.setSetting('volVoice', QA_VOICE_VOLUME / 100);
    if (QA_VIBRATION) preferenceSeed.setSetting('vibration', QA_VIBRATION);

    game = new Game({ renderer, input, loop });
    game.showDebug = false;          // no debug grid/HUD in the art frame
    if (QA_VIBRATION_CAP != null) game.haptics.supported = () => QA_VIBRATION_CAP;
    const liveHapticPulse = game.haptics.pulse.bind(game.haptics);
    game.haptics.pulse = (kind) => {
        qaHapticEvents.push(String(kind));
        return liveHapticPulse(kind);
    };
    if (QA_SETTINGS_PANE) game.settingsPane = QA_SETTINGS_PANE;
    if (QA_CHARACTER_PANE) game.characterPhonePane = QA_CHARACTER_PANE;
    if (ACTIVE_INPUT_MODE) input.setModality(ACTIVE_INPUT_MODE);

    // Campaign QA uses the production policy API, not direct save mutation.
    // Seed honest defeats before enabling the session-only map bypass, because
    // SaveSystem correctly rejects every campaign receipt while bypass is on.
    for (const token of LOCAL_QA_ORIGIN ? CAMPAIGN_BOSS_TOKENS : []) {
        const split = token.indexOf(':');
        const mapId = split >= 0 ? token.slice(0, split) : 'emberwood';
        const bossId = split >= 0 ? token.slice(split + 1) : token;
        const receipt = game.saveSystem.recordCampaignBossDefeat({ mapId, bossId, eligible: true });
        qaCampaignReceipts.push(`${mapId}:${bossId}:${receipt.reason}`);
        if (receipt.reason !== 'recorded' && receipt.reason !== 'repeat') {
            ERR.push(`campaignbosses: ${mapId}:${bossId} rejected as ${receipt.reason}`);
        }
    }
    if (QA_MAP_BYPASS && LOCAL_QA_ORIGIN) game.saveSystem.setSetting('unlockMaps', true);

    if (INPUT_REQUEST && !INPUT_MODE) ERR.push(`input: unsupported mode '${INPUT_REQUEST}'`);

        ERR.push(`render: phone Collection is not touch-safe (${qaState.collectionMinTouchCss} CSS px)`);
    }
    if (QA_PURSUIT_SET && qaState.pursuitSet !== QA_PURSUIT_SET.id) {
        ERR.push(`receipt: pursuit expected '${QA_PURSUIT_SET.id}', got '${qaState.pursuitSet}'`);
    }
    if (QA_PURSUIT_SET && qaState.collectionPhoneLayout
        && !qaState.collectionPursuitGuidance) {
        ERR.push(`render: tracked ${QA_PURSUIT_SET.id} next-source guidance was not drawn`);
    }
    if (QA_COMPLETION_SECTION) {
        if (!qaState.completionOpen || !qaState.completionRendered
            || qaState.completionSection !== QA_COMPLETION_SECTION
            || qaState.completionRenderedSection !== QA_COMPLETION_SECTION) {
            ERR.push(`completion: requested '${QA_COMPLETION_SECTION}' was not rendered`);
        }
        if (!qaState.completionTextSafe) {
            ERR.push(`completion: '${QA_COMPLETION_SECTION}' painted text beneath reserved controls`);
        }
        if (qaState.completionTotal !== 103
            || qaState.completionDeterministic !== 85
            || qaState.completionCaseOnly !== 18
            || qaState.completionCaseOnlyMythic !== 0) {
            ERR.push(`completion: model truth drifted (${qaState.completionOwned}/${qaState.completionTotal}, known ${qaState.completionDeterministic}, random ${qaState.completionCaseOnly}, mythic ${qaState.completionCaseOnlyMythic})`);
        }
        if (qaState.completionSources !== 'starter:13,boutique:44,blueprint:2,case:61,achievement:19,vigil:10') {
            ERR.push(`completion: source partition drifted '${qaState.completionSources}'`);
        }
        if (ACTIVE_INPUT_MODE === 'touch' && qaPhoneLandscape
            && (!qaState.completionTouchSafe || qaState.completionMinTouchCss < 44
                || !qaState.characterHotspotsTouchSafe)) {
            ERR.push(`completion: phone hotspots are not touch-safe (${qaState.completionMinTouchCss} CSS px)`);
        }
        if (RESET_PROFILE && !QA_COMPLETION_FIXTURE && !QA_BLUEPRINT_BUY
            && (qaState.completionOwned !== 13 || qaState.completionSetsComplete !== 0
                || qaState.completionCategories !== 'fur:3/18,cloak:2/20,hat:3/22,aura:2/21,trail:3/22')) {
            ERR.push(`completion: fresh profile truth drifted '${qaState.completionCategories}'`);
        }
        if (QA_COMPLETION_SECTION === 'case'
            && qaState.completionCaseTruth !== '59:8200:1080:720:150:10:0:false') {
            ERR.push(`completion: Royal Case truth drifted '${qaState.completionCaseTruth}'`);
        }
    }
    if (QA_BLUEPRINT_ID && qaState.completionBlueprintId !== QA_BLUEPRINT_ID) {
        ERR.push(`blueprint: expected '${QA_BLUEPRINT_ID}', got '${qaState.completionBlueprintId}'`);
    }
    if (QA_COMPLETION_FIXTURE === 'gravebell4' && !QA_BLUEPRINT_BUY
        && (qaState.completionGravebell !== '4/5' || qaState.completionOwned !== 17)) {
        ERR.push(`completionfixture: expected Gravebell 4/5 and collection 17/103, got ${qaState.completionGravebell} and ${qaState.completionOwned}/103`);
    }
    if (QA_WALLET != null && !QA_BLUEPRINT_BUY && qaState.completionWallet !== QA_WALLET) {
        ERR.push(`wallet: expected ${QA_WALLET}, got ${qaState.completionWallet}`);
    }
    if (QA_BLUEPRINT_BUY) {
        const expectedWallet = QA_WALLET - 72000;
        if (qaState.completionBlueprintReceipt !== `${QA_BLUEPRINT_ID}:72000:${expectedWallet}`
            || qaState.completionBlueprintClaims !== QA_BLUEPRINT_ID
            || qaState.completionWallet !== expectedWallet
            || qaState.completionOwned !== 18
            || qaState.completionGravebell !== '5/5'
            || qaState.completionSetsComplete !== 1) {
            ERR.push(`blueprintbuy: production receipt drifted '${qaState.completionBlueprintReceipt}', wallet ${qaState.completionWallet}, owned ${qaState.completionOwned}, set ${qaState.completionGravebell}`);
        }
    }
    if (QA_TRY_SET && !qaState.boutiqueTrailPreview) {
        ERR.push(`render: ${QA_TRY_SET.id} fitting-room trail preview was not drawn`);
    }
    if (QA_STATUSES === 'all' && qaState.statuses !== 'all') {
        ERR.push('receipt: statuses=all did not stage all seven combat statuses');
    }
    if (MENU_FOCUS && qaExpectedMenuFocusKey && qaState.menuFocusKey !== qaExpectedMenuFocusKey) {
        ERR.push(`receipt: focus expected '${qaExpectedMenuFocusKey}', got '${qaState.menuFocusKey || ''}'`);
    }
    if (MENU_FOCUS && ACTIVE_INPUT_MODE === 'keyboard' && !qaState.menuFocusVisible) {
        ERR.push('receipt: keyboard menu focus is not visible');
    }
    if (MINES_FOCUS != null && qaState.minesFocusIndex !== MINES_FOCUS) {
        ERR.push(`receipt: Mines focus expected ${MINES_FOCUS}, got ${qaState.minesFocusIndex}`);
    }
    if (QA_OBJECTIVE_PHASE && (qaState.objectivePhase !== QA_OBJECTIVE_PHASE
        || !qaState.objectiveId || !qaState.objectiveReceipt
        || (!(QA_PAUSED || QA_GAME_OVER || QA_VICTORY) && !qaState.objectiveHudVisible)
        || (!QA_GAME_OVER && !qaState.objectiveA11y))) {
        ERR.push(`receipt: objective ${QA_OBJECTIVE_PHASE} was not fully staged`);
    }
    if (QA_OBJECTIVE_PHASE && qaState.objectiveProgress !== qaState.objectiveExpectedProgress) {
        ERR.push(`receipt: objective progress expected ${qaState.objectiveExpectedProgress}, got ${qaState.objectiveProgress}`);
    }
    if (QA_OBJECTIVE_PHASE && !(QA_PAUSED || QA_GAME_OVER || QA_VICTORY)
        && !qaState.objectiveRendered) {
        ERR.push('render: active Run Path card did not complete its draw call');
    }
    if (QA_OBJECTIVE_PHASE && qaState.objectiveHudVisible
        && !qaState.objectiveTextComplete) {
        ERR.push('render: active Run Path action or reward was truncated');
    }
    if (QABOSS && !qaState.activeBossId) {
        ERR.push('boss: requested live boss was not present in the final frame');
    }
    if (QA_PAUSED && (!qaState.paused || !qaState.pauseRendered)) {
        ERR.push('receipt: pause=1 did not render the pause overlay');
    }
    if (QA_GAME_OVER && (!qaState.gameOver || !qaState.gameOverRendered)) {
        ERR.push('receipt: gameover=1 did not render the settled run summary');
    }
    if (QA_VICTORY && (!qaState.victory || !qaState.victoryRendered)) {
        ERR.push('receipt: victory=1 did not render the victory overlay');
    }
    if (QA_PAUSED && (!qaState.canvasLabel.startsWith('EMBERWAKE paused run')
        || !qaState.liveStatus.includes('Game paused'))) {
        ERR.push('a11y: pause label/live announcement did not transition');
    }
    if (QA_GAME_OVER && (!qaState.canvasLabel.startsWith('EMBERWAKE run summary')
        || !qaState.liveStatus.includes('Run over'))) {
        ERR.push('a11y: game-over label/live summary did not transition');
    }
    if (QA_VICTORY && (!qaState.canvasLabel.startsWith('EMBERWAKE victory')
        || !qaState.liveStatus.includes('VIGIL TRIUMPHANT'))) {
        ERR.push('a11y: victory label/live announcement did not transition');
    }
    if (QA_OBJECTIVE_PHASE && !(QA_PAUSED || QA_GAME_OVER || QA_VICTORY)
        && (!qaState.canvasLabel.startsWith('EMBERWAKE gameplay') || !qaState.liveStatus)) {
        ERR.push('a11y: active objective lacks gameplay label/live announcement');
    }
    if (['boss-rush', 'weekly'].includes(QA_RUN_MODE)
        && (!qaState.bossRushActive || !qaState.gauntletMetricSafe)) {
        ERR.push(`receipt: ${QA_RUN_MODE} lacks its controller or selected an unsafe metric`);
    }
    if (QA_RUN_MODE && qaState.runMode !== QA_RUN_MODE) {
        ERR.push(`receipt: runmode expected '${QA_RUN_MODE}', got '${qaState.runMode}'`);
    }

    // Final frame is on the canvas. Optionally stamp an exception badge.
    if (BADGE) {
        const ctx = renderer.ctx;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.font = 'bold 22px monospace';
        ctx.textBaseline = 'top';
        const msg = 'EXC: ' + ERR.length + (ERR.length ? ' | ' + ERR[0].slice(0, 80) : '');
        ctx.fillStyle = ERR.length ? '#ff2b2b' : '#39ff67';
        ctx.fillRect(6, 6, ctx.measureText(msg).width + 16, 30);
        ctx.fillStyle = '#000';
        ctx.fillText(msg, 14, 10);
    }
    // Expose the live game for headless drivers (dev tooling only; the shipped
    // build never loads this harness). Lets a Playwright test start Boss Rush and
    // step/inspect the sim after boot.
    window.__game = game;
    // Compact machine-readable receipt for screenshot drivers. These are the
    // exact production-facing values that own each visual branch, so a driver
    // can assert setup without inferring state from pixels or hotspot order.
    window.__qaState = qaState;
    // Mirror the receipt into inert DOM data so constrained browser drivers can
    // inspect it even when their read-only world cannot see page-owned globals.
    const qaRoot = document.documentElement;
    qaRoot.dataset.qaInput = window.__qaState.inputModality;
    qaRoot.dataset.qaFocus = window.__qaState.menuFocusKey || '';
    qaRoot.dataset.qaFocusVisible = String(window.__qaState.menuFocusVisible);
    qaRoot.dataset.qaReduced = String(window.__qaState.reducedEffects);
    qaRoot.dataset.qaUiScale = String(window.__qaState.uiScale);
    qaRoot.dataset.qaHighContrast = String(window.__qaState.highContrast);
    qaRoot.dataset.qaCaptions = String(window.__qaState.captions);
    qaRoot.dataset.qaCaptionDetail = window.__qaState.captionDetail;
    qaRoot.dataset.qaMono = String(window.__qaState.monoAudio);
    qaRoot.dataset.qaVoiceVolume = String(window.__qaState.voiceVolume);
    qaRoot.dataset.qaVibration = window.__qaState.vibration;
    qaRoot.dataset.qaRuntimeCaptions = String(window.__qaState.runtimeCaptions);
    qaRoot.dataset.qaRuntimeCaptionDetail = window.__qaState.runtimeCaptionDetail;
    qaRoot.dataset.qaRuntimeMono = String(window.__qaState.runtimeMonoAudio);
    qaRoot.dataset.qaRuntimeVoiceVolume = String(window.__qaState.runtimeVoiceVolume);
    qaRoot.dataset.qaRuntimeVibration = window.__qaState.runtimeVibration;
    qaRoot.dataset.qaOutputChannels = window.__qaState.outputChannels == null
        ? ''
        : String(window.__qaState.outputChannels);
    qaRoot.dataset.qaVibrationSupported = String(window.__qaState.vibrationSupported);
    qaRoot.dataset.qaCaptionKey = window.__qaState.captionKey;
    qaRoot.dataset.qaCaptionKind = window.__qaState.captionKind;
    qaRoot.dataset.qaCaptionText = window.__qaState.captionText;
    qaRoot.dataset.qaHapticEvents = window.__qaState.hapticEvents;
    qaRoot.dataset.qaDevControls = String(window.__qaState.devControls);
    qaRoot.dataset.qaMapBypass = String(window.__qaState.mapBypassActive);
    qaRoot.dataset.qaCampaignReceipts = window.__qaState.campaignReceipts;
    qaRoot.dataset.qaCampaignStatus = window.__qaState.campaignStatus;
    qaRoot.dataset.qaSettingsPane = window.__qaState.settingsPane;
    qaRoot.dataset.qaCharacterPhonePane = window.__qaState.characterPhonePane;
    qaRoot.dataset.qaCharacterPhonePaneRendered = window.__qaState.characterPhonePaneRendered;
    qaRoot.dataset.qaCharacterPhonePaneTouchSafe = String(window.__qaState.characterPhonePaneTouchSafe);
    qaRoot.dataset.qaCharacterPhonePaneMinTouchCss = String(window.__qaState.characterPhonePaneMinTouchCss);
    qaRoot.dataset.qaCharacterMinHotspotCss = String(window.__qaState.characterMinHotspotCss);
    qaRoot.dataset.qaCharacterHotspotsTouchSafe = String(window.__qaState.characterHotspotsTouchSafe);
    qaRoot.dataset.qaCosmeticSet = window.__qaState.cosmeticSet;
    qaRoot.dataset.qaCollectionCategory = window.__qaState.collectionCategory;
    qaRoot.dataset.qaCollectionPage = String(window.__qaState.collectionPage);
    qaRoot.dataset.qaCollectionPhoneLayout = String(window.__qaState.collectionPhoneLayout);
    qaRoot.dataset.qaCollectionTouchSafe = String(window.__qaState.collectionTouchSafe);
    qaRoot.dataset.qaCollectionMinTouchCss = String(window.__qaState.collectionMinTouchCss);
    qaRoot.dataset.qaCollectionPursuitGuidance = String(window.__qaState.collectionPursuitGuidance);
    qaRoot.dataset.qaCollectionNavTouchSafe = String(window.__qaState.collectionNavTouchSafe);
    qaRoot.dataset.qaCollectionNavMinTouchCss = String(window.__qaState.collectionNavMinTouchCss);
    qaRoot.dataset.qaCollectionRuntimeMatches = String(window.__qaState.collectionRuntimeMatches);
    qaRoot.dataset.qaCompletionOpen = String(window.__qaState.completionOpen);
    qaRoot.dataset.qaCompletionSection = window.__qaState.completionSection;
    qaRoot.dataset.qaCompletionRendered = String(window.__qaState.completionRendered);
    qaRoot.dataset.qaCompletionRenderedSection = window.__qaState.completionRenderedSection;
    qaRoot.dataset.qaCompletionTouchSafe = String(window.__qaState.completionTouchSafe);
    qaRoot.dataset.qaCompletionMinTouchCss = String(window.__qaState.completionMinTouchCss);
    qaRoot.dataset.qaCompletionTextSafe = String(window.__qaState.completionTextSafe);
    qaRoot.dataset.qaCompletionOwned = String(window.__qaState.completionOwned);
    qaRoot.dataset.qaCompletionTotal = String(window.__qaState.completionTotal);
    qaRoot.dataset.qaCompletionSetsComplete = String(window.__qaState.completionSetsComplete);
    qaRoot.dataset.qaCompletionDeterministic = String(window.__qaState.completionDeterministic);
    qaRoot.dataset.qaCompletionCaseOnly = String(window.__qaState.completionCaseOnly);
    qaRoot.dataset.qaCompletionCaseOnlyMythic = String(window.__qaState.completionCaseOnlyMythic);
    qaRoot.dataset.qaCompletionSources = window.__qaState.completionSources;
    qaRoot.dataset.qaCompletionCategories = window.__qaState.completionCategories;
    qaRoot.dataset.qaCompletionBlueprintId = window.__qaState.completionBlueprintId;
    qaRoot.dataset.qaCompletionBlueprintClaims = window.__qaState.completionBlueprintClaims;
    qaRoot.dataset.qaCompletionBlueprintConfirm = window.__qaState.completionBlueprintConfirm;
    qaRoot.dataset.qaCompletionBlueprintPending = window.__qaState.completionBlueprintPending;
    qaRoot.dataset.qaCompletionBlueprintReceipt = window.__qaState.completionBlueprintReceipt;
    qaRoot.dataset.qaCompletionGravebell = window.__qaState.completionGravebell;
    qaRoot.dataset.qaCompletionWallet = String(window.__qaState.completionWallet);
    qaRoot.dataset.qaCompletionCaseTruth = window.__qaState.completionCaseTruth;
    qaRoot.dataset.qaPursuitSet = window.__qaState.pursuitSet;
    qaRoot.dataset.qaBoutiqueCategory = window.__qaState.boutiqueCategory;
    qaRoot.dataset.qaBoutiqueSetPage = String(window.__qaState.boutiqueSetPage);
    qaRoot.dataset.qaBoutiqueTrailPreview = String(window.__qaState.boutiqueTrailPreview);
    qaRoot.dataset.qaStatuses = window.__qaState.statuses;
    qaRoot.dataset.qaMinesFocus = window.__qaState.minesFocusIndex == null
        ? ''
        : String(window.__qaState.minesFocusIndex);
    qaRoot.dataset.qaObjectivePhase = window.__qaState.objectivePhase;
    qaRoot.dataset.qaObjectiveId = window.__qaState.objectiveId;
    qaRoot.dataset.qaObjectiveMetric = window.__qaState.objectiveMetric;
    qaRoot.dataset.qaObjectiveProgress = window.__qaState.objectiveProgress == null
        ? '' : String(window.__qaState.objectiveProgress);
    qaRoot.dataset.qaObjectiveExpectedProgress = window.__qaState.objectiveExpectedProgress == null
        ? '' : String(window.__qaState.objectiveExpectedProgress);
    qaRoot.dataset.qaObjectiveTarget = window.__qaState.objectiveTarget == null
        ? '' : String(window.__qaState.objectiveTarget);
    qaRoot.dataset.qaObjectiveStatus = window.__qaState.objectiveStatus;
    qaRoot.dataset.qaObjectiveReceipt = window.__qaState.objectiveReceipt;
    qaRoot.dataset.qaObjectiveSubstitution = window.__qaState.objectiveSubstitution;
    qaRoot.dataset.qaObjectiveHudVisible = String(window.__qaState.objectiveHudVisible);
    qaRoot.dataset.qaObjectiveRendered = String(window.__qaState.objectiveRendered);
    qaRoot.dataset.qaObjectiveVariant = window.__qaState.objectiveVariant;
    qaRoot.dataset.qaObjectiveTextComplete = String(window.__qaState.objectiveTextComplete);
    qaRoot.dataset.qaObjectiveA11y = window.__qaState.objectiveA11y;
    qaRoot.dataset.qaActiveBossId = window.__qaState.activeBossId;
    qaRoot.dataset.qaRunMode = window.__qaState.runMode;
    qaRoot.dataset.qaBossRushActive = String(window.__qaState.bossRushActive);
    qaRoot.dataset.qaGauntletMetricSafe = String(window.__qaState.gauntletMetricSafe);
    qaRoot.dataset.qaPaused = String(window.__qaState.paused);
    qaRoot.dataset.qaPauseRendered = String(window.__qaState.pauseRendered);
    qaRoot.dataset.qaGameOver = String(window.__qaState.gameOver);
    qaRoot.dataset.qaGameOverRendered = String(window.__qaState.gameOverRendered);
    qaRoot.dataset.qaVictory = String(window.__qaState.victory);
    qaRoot.dataset.qaVictoryRendered = String(window.__qaState.victoryRendered);
    qaRoot.dataset.qaCanvasLabel = window.__qaState.canvasLabel;
    qaRoot.dataset.qaLiveStatus = window.__qaState.liveStatus;
    qaRoot.dataset.qaViewportWidth = String(window.__qaState.viewportWidth);
    qaRoot.dataset.qaViewportHeight = String(window.__qaState.viewportHeight);
    qaRoot.dataset.qaRendererCssWidth = String(window.__qaState.rendererCssWidth);
    qaRoot.dataset.qaRendererCssHeight = String(window.__qaState.rendererCssHeight);
    qaRoot.dataset.qaRendererDpr = String(window.__qaState.rendererDpr);
    qaRoot.dataset.qaRendererSafeArea = window.__qaState.rendererSafeArea;
    qaRoot.dataset.qaMenuContentRect = window.__qaState.menuContentRect;
    qaRoot.dataset.qaCanvasBacking = window.__qaState.canvasBacking;
    qaRoot.dataset.qaErrorKeys = [...new Set(ERR.map((entry) => String(entry).split(':', 1)[0]))]
        .sort()
        .join(',');
    // In-app browser QA cannot rely on OS-level screenshot flags. When an
    // output name is requested, persist the exact production canvas through
    // the existing local artshot PUT endpoint before publishing DONE.
    if (OUT) {
        try {
            const blob = await new Promise((resolve, reject) => canvas.toBlob(
                (value) => value ? resolve(value) : reject(new Error('canvas.toBlob returned null')),
                'image/png'));
            const response = await fetch('/__save/' + OUT, { method: 'PUT', body: blob });
            if (!response.ok) throw new Error(`save returned ${response.status}`);
            qaRoot.dataset.qaOutput = OUT;
        } catch (error) {
            ERR.push('save: ' + String(error && error.message || error));
        }
    }
    qaRoot.dataset.qaReady = '1';
    document.title = 'DONE EXC:' + ERR.length + ' enemies:' + (game.enemies ? game.enemies.length : -1) +
        ' map:' + (game._obstacleBiome || 'unknown') + qaBossSummary
        + (ERR.length ? ' error:' + ERR[0].slice(0, 320).replace(/\s+/g, ' ') : '');
    window.__done = true;
}

boot().catch((e) => {
    const message = 'boot: ' + String(e && e.stack || e);
    ERR.push(message);
    window.__bootError = message;
    console.error(message);
    document.title = 'BOOTFAIL ' + message.slice(0, 120);
});
</script>
</body>
</html>
