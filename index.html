<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <meta name="format-detection" content="telephone=no" />
    <title>EMBERWAKE — Hold the Last Light</title>
    <!-- Game logo (monkey wick-keeper in a forged ember ring): browser-tab
         favicon + the iOS/Android home-screen icon for the installed app.
         iOS reads apple-touch-icon; Android/Chrome installs read the
         manifest icons. NOTE: iOS bakes the icon into a bookmark at add
         time — an existing bookmark must be re-added to pick up changes. -->
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="EMBERWAKE" />
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <div id="stage">
        <canvas
            id="game"
            tabindex="0"
            role="application"
            aria-roledescription="survival action game"
            aria-label="EMBERWAKE main menu"
            aria-describedby="game-instructions game-objective"
        ></canvas>
    </div>
    <p id="game-instructions" class="sr-only">
        Use Tab or the arrow keys to move between menu choices, Enter or Space
        to activate a choice, and Escape to go back. During a run, use WASD or
        the arrow keys to move, Space to blink, Q to Kindle, O to hear the
        current Run Path task, and P to pause.
    </p>
    <p id="game-objective" class="sr-only"></p>
    <div id="game-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <div id="rotate-hint" aria-hidden="true">
        <span>📱↻ Rotate your device to landscape</span>
    </div>
    <noscript>
        <p style="color:#fff;text-align:center;">This game requires JavaScript.</p>
    </noscript>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
