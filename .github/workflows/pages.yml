name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/survivor-game-design-3oxjm3
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let in-flight runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Turn Pages on automatically the first time this runs so the
          # user doesn't have to flip the repo settings toggle by hand.
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # No build step — the repo root IS the site (index.html + src/).
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
