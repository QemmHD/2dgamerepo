# CI — automates the repo's existing verify-before-ship pattern:
#   1. node --check every ES module under src/ (syntax gate, no bundler)
#   2. node tools/validate-assets.js (every AI/licensed asset is credited)
#   2b. node tools/validate-bosses.js (apex phase-2 pools resolve + keep their
#       signature; every attack telegraphs) — guards the silent revert-to-full-
#       kit failure where a typo'd phase2Attacks id passes every smoke test
#   2c. progression, fair-gambling, combat-integrity, UX-flow, Living Vigil,
#       world/HUD, house-navigation, and adaptive-audio data/policy gates
#   3. headless-Chromium harness smoke: boot the REAL game for 20 sim-seconds
#      via tools/artshot/harness.html and assert zero exceptions (EXC: 0)
#      and a live swarm (enemies > 0), read from the harness's document.title
#      ("DONE EXC:<n> enemies:<m>").
# Mirrors the manual gate in CLAUDE.md; pages.yml still owns deploys.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 22+: `node --check` auto-detects ESM syntax in .js files (this
      # no-bundler repo has no package.json "type" field to declare it).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax-check all src modules
        run: |
          set -e
          find src tools \( -name '*.js' -o -name '*.mjs' \) | while read -r f; do
            node --check "$f"
          done
          echo "node --check: all modules OK"

      - name: Validate asset credits
        run: node tools/validate-assets.js

      - name: Validate boss kits (phase-2 integrity + telegraphs)
        run: node tools/validate-bosses.js

      - name: Validate progression economy
        run: node tools/validate-progression.js

      - name: Validate exact campaign map progression
        run: node tools/validate-campaign-progression.js

      - name: Validate deterministic guided Run Path
        run: node tools/validate-run-objectives.js

      - name: Validate fair gambling economy and disclosures
        run: node tools/validate-gambling-economy.js

      - name: Validate durable once-only Mines cashouts
        run: node tools/validate-mines-transaction-durability.js

      - name: Validate combat integrity
        run: node tools/validate-combat-integrity.js

      - name: Validate UX flows
        run: node tools/validate-ux-flows.js

      - name: Validate accessibility and input contracts
        run: node tools/validate-accessibility.js

      - name: Validate high-contrast combat cues
        run: node tools/validate-combat-cues.js

      - name: Validate reduced-motion save inheritance
        run: node tools/validate-accessibility-save.js

      - name: Validate gameplay captions
        run: node tools/validate-captions.js

      - name: Validate touch vibration fallbacks
        run: node tools/validate-haptics.js

      - name: Validate accessible minigame motion and focus
        run: node tools/validate-minigame-accessibility.js

      - name: Validate phone Settings geometry
        run: node tools/validate-phone-settings.js

      - name: Validate Living Vigil sites
        run: node tools/validate-vigil-sites.js

      - name: Validate Living Vigil tactical encounters
        run: node tools/validate-encounters.js

      - name: Validate Living Vigil tracker
        run: node tools/validate-vigil-tracker.js

      - name: Validate Living Vigil integration
        run: node tools/validate-living-vigil-integration.js

      - name: Validate biome dressing and structure cohesion
        run: node tools/validate-world.js

      - name: Validate HUD layout contracts
        run: node tools/validate-hud-layout.js

      - name: Validate animated cosmetic attachment contracts
        run: node tools/validate-cosmetic-attachments.js

      - name: Validate cosmetic collection reachability and source truth
        run: node tools/validate-cosmetic-collection.js

      - name: Validate Collection Completion truth and case disclosures
        run: node tools/validate-collection-completion.js

      - name: Validate atomic Mythic Blueprint purchases
        run: node tools/validate-blueprint-purchase.js

      - name: Validate Collection Completion session flow
        run: node tools/validate-collection-completion-flow.js

      - name: Validate house-safe enemy navigation
        run: node tools/validate-navigation.js

      - name: Validate adaptive score catalog and policy
        run: node tools/validate-audio.js

      - name: Harness smoke (EXC 0, enemies alive)
        run: |
          set -e
          # Serve the repo root exactly like local verification does.
          python3 tools/artshot/serve.py 8909 . &
          sleep 1
          # Prefer the dev container's pinned Playwright Chromium when present
          # (so this step runs identically in local sandboxes); fall back to
          # the runner image's Chrome.
          CHROME=$(ls /opt/pw-browsers/chromium-*/chrome-linux/chrome 2>/dev/null | head -1 || true)
          CHROME=${CHROME:-$(command -v google-chrome || command -v chromium-browser || command -v chromium)}
          echo "Using browser: $CHROME"

          # Build every shipped hero through the real browser Canvas path before
          # the gameplay smoke. This catches bespoke-sheet decode/build failures
          # that getAiHeroFrames intentionally hides behind its safe fallback.
          HERO_CONTRACT_DOM=/tmp/hero-contract.html
          HERO_CONTRACT_PROFILE=$(mktemp -d)
          timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
            --disable-background-networking --disable-component-update \
            --force-device-scale-factor=1 --window-size=1280,720 \
            --virtual-time-budget=10000 --user-data-dir="$HERO_CONTRACT_PROFILE" \
            --dump-dom "http://127.0.0.1:8909/tools/artshot/herocontract.html" \
            > "$HERO_CONTRACT_DOM"
          HERO_CONTRACT_TITLE=$(grep -o '<title>[^<]*</title>' "$HERO_CONTRACT_DOM" | head -1)
          echo "Hero contract: $HERO_CONTRACT_TITLE"
          echo "$HERO_CONTRACT_TITLE" | grep -q \
            'DONE EXC:0 heroes:6 variants:12 frames:324 replaceable:3' || {
              echo 'FAIL: browser hero matrix did not pass'; exit 1;
            }
          grep -q 'data-qa-ready="1"' "$HERO_CONTRACT_DOM" \
            && grep -q 'data-qa-heroes="6"' "$HERO_CONTRACT_DOM" \
            && grep -q 'data-qa-variants="12"' "$HERO_CONTRACT_DOM" \
            && grep -q 'data-qa-frames="324"' "$HERO_CONTRACT_DOM" \
            && grep -q 'data-qa-replaceable="3"' "$HERO_CONTRACT_DOM" \
            && grep -q 'data-qa-error-keys=""' "$HERO_CONTRACT_DOM" || {
              echo 'FAIL: browser hero matrix omitted its QA receipt'; exit 1;
            }

          # --dump-dom serializes the page after the virtual-time budget, so
          # the <title> carries the harness's final "DONE EXC:<n> enemies:<m>".
          timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
            --autoplay-policy=no-user-gesture-required \
            --disable-background-networking --disable-component-update \
            --force-device-scale-factor=1 --window-size=1600,900 \
            --virtual-time-budget=15000 --user-data-dir="$(mktemp -d)" \
            --dump-dom "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=20&badge=1" \
            > /tmp/harness-dom.html
          TITLE=$(grep -o '<title>[^<]*</title>' /tmp/harness-dom.html | head -1)
          echo "Harness title: $TITLE"
          echo "$TITLE" | grep -q 'DONE EXC:0 ' || { echo 'FAIL: harness reported exceptions (or never finished)'; exit 1; }
          ENEMIES=$(echo "$TITLE" | grep -o 'enemies:[0-9-]*' | cut -d: -f2)
          [ "${ENEMIES:-0}" -gt 0 ] || { echo "FAIL: no live enemies after 20s (enemies=$ENEMIES)"; exit 1; }
          echo "Harness smoke OK ($TITLE)"

          # Fast render-branch matrix: every biome, both house camera branches,
          # Living Vigil rewards, touch HUD, progression receipt and Mines must
          # render exception-free in the same real-game harness used locally.
          MATRIX_INDEX=0
          while IFS='|' read -r EXPECTED_MAP QUERY; do
            MATRIX_INDEX=$((MATRIX_INDEX + 1))
            MATRIX_DOM="/tmp/harness-matrix-${MATRIX_INDEX}.html"
            MATRIX_TOUCH=false
            MATRIX_WINDOW_WIDTH=1280
            MATRIX_WINDOW_HEIGHT=720
            MATRIX_ATTEMPTS=1
            if [[ "&${QUERY}&" == *"&touch=1&"* ]]; then
              MATRIX_TOUCH=true
              MATRIX_WINDOW_WIDTH=667
              MATRIX_WINDOW_HEIGHT=375
              MATRIX_ATTEMPTS=3
            fi
            # Chrome's --window-size may describe outer bounds on one runner
            # and the content viewport on another. Touch rows calibrate against
            # the harness's real window.innerWidth/innerHeight receipt, then the
            # final DOM must prove the exact 667x375 playable viewport.
            for ((MATRIX_ATTEMPT=1; MATRIX_ATTEMPT<=MATRIX_ATTEMPTS; MATRIX_ATTEMPT++)); do
              MATRIX_PROFILE=$(mktemp -d)
              MATRIX_WINDOW="${MATRIX_WINDOW_WIDTH},${MATRIX_WINDOW_HEIGHT}"
              timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
                --autoplay-policy=no-user-gesture-required \
                --disable-background-networking --disable-component-update \
                --force-device-scale-factor=1 --window-size="$MATRIX_WINDOW" \
                --virtual-time-budget=7000 --user-data-dir="$MATRIX_PROFILE" \
                --dump-dom "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=1&badge=1&${QUERY}" \
                > "$MATRIX_DOM"
              if [[ "$MATRIX_TOUCH" != true ]]; then break; fi
              VIEWPORT_WIDTH=$(grep -o 'data-qa-viewport-width="[0-9]*"' "$MATRIX_DOM" | head -1 | cut -d'"' -f2)
              VIEWPORT_HEIGHT=$(grep -o 'data-qa-viewport-height="[0-9]*"' "$MATRIX_DOM" | head -1 | cut -d'"' -f2)
              if [[ ! "$VIEWPORT_WIDTH" =~ ^[0-9]+$ || ! "$VIEWPORT_HEIGHT" =~ ^[0-9]+$ ]]; then
                echo "FAIL: touch scenario '${QUERY}' omitted its numeric viewport receipt"; exit 1
              fi
              if (( VIEWPORT_WIDTH == 667 && VIEWPORT_HEIGHT == 375 )); then break; fi
              MATRIX_WINDOW_WIDTH=$((MATRIX_WINDOW_WIDTH + 667 - VIEWPORT_WIDTH))
              MATRIX_WINDOW_HEIGHT=$((MATRIX_WINDOW_HEIGHT + 375 - VIEWPORT_HEIGHT))
              if (( MATRIX_WINDOW_WIDTH < 320 || MATRIX_WINDOW_WIDTH > 2048
                || MATRIX_WINDOW_HEIGHT < 240 || MATRIX_WINDOW_HEIGHT > 2048 )); then
                echo "FAIL: touch viewport calibration produced implausible outer bounds ${MATRIX_WINDOW_WIDTH}x${MATRIX_WINDOW_HEIGHT}"; exit 1
              fi
            done
            MATRIX_TITLE=$(grep -o '<title>[^<]*</title>' "$MATRIX_DOM" | head -1)
            echo "Matrix ${MATRIX_INDEX}: $MATRIX_TITLE"
            echo "$MATRIX_TITLE" | grep -q 'DONE EXC:0 ' || {
              echo "FAIL: matrix scenario '${QUERY}' reported exceptions (or never finished)"; exit 1;
            }
            echo "$MATRIX_TITLE" | grep -q "map:${EXPECTED_MAP}" || {
              echo "FAIL: matrix scenario '${QUERY}' did not render requested map '${EXPECTED_MAP}'"; exit 1;
            }
            grep -q 'data-qa-ready="1"' "$MATRIX_DOM" || {
              echo "FAIL: matrix scenario '${QUERY}' omitted its QA receipt"; exit 1;
            }
            if [[ "$MATRIX_TOUCH" == true ]]; then
              grep -q 'data-qa-viewport-width="667"' "$MATRIX_DOM" \
                && grep -q 'data-qa-viewport-height="375"' "$MATRIX_DOM" || {
                  echo "FAIL: touch scenario '${QUERY}' inner viewport was ${VIEWPORT_WIDTH:-missing}x${VIEWPORT_HEIGHT:-missing}; expected exact 667x375 after calibration"; exit 1;
                }
            fi
            if [[ "$QUERY" == *"input=keyboard"* ]]; then
              grep -q 'data-qa-input="keyboard"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not stage keyboard modality"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"reduced=1"* ]]; then
              grep -q 'data-qa-reduced="true"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not persist Reduced Effects"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ uiscale=([0-9]+) ]]; then
              EXPECTED_UI_SCALE="${BASH_REMATCH[1]}"
              grep -q "data-qa-ui-scale=\"${EXPECTED_UI_SCALE}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not apply Combat HUD size ${EXPECTED_UI_SCALE}%"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ contrast=([01]) ]]; then
              EXPECTED_CONTRAST="false"
              if [ "${BASH_REMATCH[1]}" = "1" ]; then EXPECTED_CONTRAST="true"; fi
              grep -q "data-qa-high-contrast=\"${EXPECTED_CONTRAST}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not apply high contrast=${EXPECTED_CONTRAST}"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ settingspane=([a-z]+) ]]; then
              EXPECTED_SETTINGS_PANE="${BASH_REMATCH[1]}"
              grep -q "data-qa-settings-pane=\"${EXPECTED_SETTINGS_PANE}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not stage Settings pane '${EXPECTED_SETTINGS_PANE}'"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ captions=([01]) ]]; then
              EXPECTED_CAPTIONS="false"
              if [ "${BASH_REMATCH[1]}" = "1" ]; then EXPECTED_CAPTIONS="true"; fi
              grep -q "data-qa-captions=\"${EXPECTED_CAPTIONS}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not apply captions=${EXPECTED_CAPTIONS}"; exit 1;
              }
              grep -q "data-qa-runtime-captions=\"${EXPECTED_CAPTIONS}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not cold-boot runtime captions=${EXPECTED_CAPTIONS}"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ captiondetail=([a-z]+) ]]; then
              grep -q "data-qa-caption-detail=\"${BASH_REMATCH[1]}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not apply caption detail '${BASH_REMATCH[1]}'"; exit 1;
              }
              grep -q "data-qa-runtime-caption-detail=\"${BASH_REMATCH[1]}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not cold-boot runtime caption detail '${BASH_REMATCH[1]}'"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ mono=([01]) ]]; then
              EXPECTED_MONO="false"
              if [ "${BASH_REMATCH[1]}" = "1" ]; then EXPECTED_MONO="true"; fi
              grep -q "data-qa-mono=\"${EXPECTED_MONO}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not apply mono=${EXPECTED_MONO}"; exit 1;
              }
              grep -q "data-qa-runtime-mono=\"${EXPECTED_MONO}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not cold-boot runtime mono=${EXPECTED_MONO}"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ voicevol=([0-9]+) ]]; then
              grep -q "data-qa-voice-volume=\"${BASH_REMATCH[1]}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not apply voice volume ${BASH_REMATCH[1]}"; exit 1;
              }
              grep -q "data-qa-runtime-voice-volume=\"${BASH_REMATCH[1]}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not cold-boot runtime voice volume ${BASH_REMATCH[1]}"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ vibration=(off|low|full) ]]; then
              grep -q "data-qa-vibration=\"${BASH_REMATCH[1]}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not apply vibration '${BASH_REMATCH[1]}'"; exit 1;
              }
              grep -q "data-qa-runtime-vibration=\"${BASH_REMATCH[1]}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not cold-boot runtime vibration '${BASH_REMATCH[1]}'"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ vibrationcap=([01]) ]]; then
              EXPECTED_VIBRATION_CAP="false"
              if [ "${BASH_REMATCH[1]}" = "1" ]; then EXPECTED_VIBRATION_CAP="true"; fi
              grep -q "data-qa-vibration-supported=\"${EXPECTED_VIBRATION_CAP}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not stage vibration capability ${EXPECTED_VIBRATION_CAP}"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ caption=(voice|danger) ]]; then
              EXPECTED_CAPTION="${BASH_REMATCH[1]}"
              grep -q "data-qa-caption-key=\"qa-${EXPECTED_CAPTION}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not stage caption '${EXPECTED_CAPTION}'"; exit 1;
              }
              if [ "$EXPECTED_CAPTION" = "voice" ]; then
                grep -q 'data-qa-caption-kind="speech"' "$MATRIX_DOM" || { echo 'FAIL: voice fixture lost speech kind'; exit 1; }
                grep -q 'data-qa-caption-text="Only embers remain\."' "$MATRIX_DOM" || { echo 'FAIL: voice fixture transcript drifted'; exit 1; }
              else
                grep -q 'data-qa-caption-kind="sound"' "$MATRIX_DOM" || { echo 'FAIL: danger fixture lost sound kind'; exit 1; }
                grep -q 'data-qa-caption-text="Apex blast charging nearby"' "$MATRIX_DOM" || { echo 'FAIL: danger fixture text drifted'; exit 1; }
              fi
            fi
            if [[ "$QUERY" == *"bosswarning=1"* ]]; then
              grep -q 'data-qa-caption-key="boss-warning-stormwingAlpha"' "$MATRIX_DOM" || {
                echo "FAIL: real boss warning did not reach the caption lane"; exit 1;
              }
              grep -q 'data-qa-haptic-events="[^"]*bossWarning' "$MATRIX_DOM" || {
                echo "FAIL: real boss warning did not request its haptic cue"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"dev=1"* ]]; then
              grep -q 'data-qa-dev-controls="5"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not retain all five ?dev=1 Settings controls"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"statuses=all"* ]]; then
              grep -q 'data-qa-statuses="all"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not stage every combat status cue"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"focus=tab%3Aplay%230"* ]]; then
              grep -q 'data-qa-focus="tab:play#0"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not retain the requested menu focus"; exit 1;
              }
              grep -q 'data-qa-focus-visible="true"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not expose visible keyboard focus"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"focus=setUiScale%3A130%230"* ]]; then
              grep -q 'data-qa-focus="setUiScale:130#0"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not retain the 130% Combat HUD size focus"; exit 1;
              }
              grep -q 'data-qa-focus-visible="true"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not expose visible keyboard focus"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"focus=collectionCategory%3Ahat%230"* ]]; then
              grep -q 'data-qa-focus="collectionCategory:hat#0"' "$MATRIX_DOM" || {
                echo "FAIL: Character Collection did not retain category-filter focus"; exit 1;
              }
              grep -q 'data-qa-focus-visible="true"' "$MATRIX_DOM" || {
                echo "FAIL: Character Collection did not expose visible keyboard focus"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"focus=boutiqueCategory%3Aaura%230"* ]]; then
              grep -q 'data-qa-focus="boutiqueCategory:aura#0"' "$MATRIX_DOM" || {
                echo "FAIL: Boutique did not retain category-filter focus"; exit 1;
              }
              grep -q 'data-qa-focus-visible="true"' "$MATRIX_DOM" || {
                echo "FAIL: Boutique did not expose visible keyboard focus"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"minesFocus=7"* ]]; then
              grep -q 'data-qa-mines-focus="7"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not retain the requested Mines focus"; exit 1;
              }
            fi
            if [[ "&${QUERY}&" == *"&boss=1&"* ]]; then
              grep -q 'data-qa-active-boss-id="stormwingAlpha"' "$MATRIX_DOM" || {
                echo "FAIL: live boss phone fixture did not retain Stormwing Alpha"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ objectivephase=([a-z]+) ]]; then
              EXPECTED_OBJECTIVE_PHASE="${BASH_REMATCH[1]}"
              case "$EXPECTED_OBJECTIVE_PHASE" in
                orientation) EXPECTED_OBJECTIVE_INDEX=0 ;;
                tactic) EXPECTED_OBJECTIVE_INDEX=1 ;;
                climax) EXPECTED_OBJECTIVE_INDEX=2 ;;
              esac
              grep -q "data-qa-objective-phase=\"${EXPECTED_OBJECTIVE_PHASE}\"" "$MATRIX_DOM" \
                && grep -q 'data-qa-objective-id="[^\"]\+"' "$MATRIX_DOM" \
                && grep -q 'data-qa-objective-metric="[^\"]\+"' "$MATRIX_DOM" \
                && grep -q 'data-qa-objective-progress="[0-9]\+"' "$MATRIX_DOM" \
                && grep -q 'data-qa-objective-expected-progress="[0-9]\+"' "$MATRIX_DOM" \
                && grep -q 'data-qa-objective-target="[1-9][0-9]*"' "$MATRIX_DOM" \
                && grep -q 'data-qa-objective-status="active"' "$MATRIX_DOM" \
                && grep -q "data-qa-objective-receipt=\"go[0-9a-z]\\+:${EXPECTED_OBJECTIVE_INDEX}:[A-Za-z0-9_-]\\+\"" "$MATRIX_DOM" || {
                  echo "FAIL: matrix scenario '${QUERY}' omitted its complete Run Path receipt"; exit 1;
                }
              ACTUAL_OBJECTIVE_PROGRESS=$(grep -o 'data-qa-objective-progress="[0-9]*"' "$MATRIX_DOM" | head -1 | cut -d'"' -f2)
              EXPECTED_OBJECTIVE_PROGRESS=$(grep -o 'data-qa-objective-expected-progress="[0-9]*"' "$MATRIX_DOM" | head -1 | cut -d'"' -f2)
              [ "$ACTUAL_OBJECTIVE_PROGRESS" = "$EXPECTED_OBJECTIVE_PROGRESS" ] || {
                echo "FAIL: matrix scenario '${QUERY}' did not stage its exact requested progress"; exit 1;
              }
              EXPECTED_OBJECTIVE_HUD="true"
              if [[ "$QUERY" == *"pause=1"* || "$QUERY" == *"gameover=1"* || "$QUERY" == *"victory=1"* ]]; then
                EXPECTED_OBJECTIVE_HUD="false"
              fi
              grep -q "data-qa-objective-hud-visible=\"${EXPECTED_OBJECTIVE_HUD}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' exposed the wrong persistent Run Path HUD state"; exit 1;
              }
              grep -q "data-qa-objective-rendered=\"${EXPECTED_OBJECTIVE_HUD}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not produce the matching Run Path draw receipt"; exit 1;
              }
              if [[ "$EXPECTED_OBJECTIVE_HUD" == true ]]; then
                grep -q 'data-qa-objective-text-complete="true"' "$MATRIX_DOM" || {
                  echo "FAIL: matrix scenario '${QUERY}' truncated its Run Path action or reward"; exit 1;
                }
                if [[ "$MATRIX_TOUCH" == true ]]; then
                  EXPECTED_OBJECTIVE_VARIANT="phone"
                  if [[ "&${QUERY}&" == *"&boss=1&"* ]]; then EXPECTED_OBJECTIVE_VARIANT="edge"; fi
                  grep -q "data-qa-objective-variant=\"${EXPECTED_OBJECTIVE_VARIANT}\"" "$MATRIX_DOM" || {
                    echo "FAIL: matrix scenario '${QUERY}' rendered the wrong phone Run Path variant"; exit 1;
                  }
                fi
              fi
              if [[ "$QUERY" == *"gameover=1"* ]]; then
                grep -q 'data-qa-objective-a11y=""' "$MATRIX_DOM" || {
                  echo "FAIL: game-over matrix retained a stale current-objective description"; exit 1;
                }
              else
                grep -q 'data-qa-objective-a11y="[^\"]\+"' "$MATRIX_DOM" || {
                  echo "FAIL: matrix scenario '${QUERY}' omitted current-objective accessibility copy"; exit 1;
                }
              fi
              if [[ "$QUERY" != *"pause=1"* && "$QUERY" != *"gameover=1"* && "$QUERY" != *"victory=1"* ]]; then
                grep -q 'data-qa-canvas-label="EMBERWAKE gameplay' "$MATRIX_DOM" \
                  && grep -q 'data-qa-live-status="[^\"]\+"' "$MATRIX_DOM" || {
                    echo "FAIL: active objective lost its canvas label or live announcement"; exit 1;
                  }
              fi
            fi
            if [[ "$QUERY" == *"pause=1"* ]]; then
              grep -q 'data-qa-paused="true"' "$MATRIX_DOM" \
                && grep -q 'data-qa-pause-rendered="true"' "$MATRIX_DOM" \
                && grep -q 'data-qa-canvas-label="EMBERWAKE paused run' "$MATRIX_DOM" \
                && grep -q 'data-qa-live-status="Game paused' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not open the production pause overlay"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"gameover=1"* ]]; then
              grep -q 'data-qa-game-over="true"' "$MATRIX_DOM" \
                && grep -q 'data-qa-game-over-rendered="true"' "$MATRIX_DOM" \
                && grep -q 'data-qa-canvas-label="EMBERWAKE run summary' "$MATRIX_DOM" \
                && grep -q 'data-qa-live-status="Run over' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not settle the production game-over path"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"victory=1"* ]]; then
              grep -q 'data-qa-victory="true"' "$MATRIX_DOM" \
                && grep -q 'data-qa-victory-rendered="true"' "$MATRIX_DOM" \
                && grep -q 'data-qa-canvas-label="EMBERWAKE victory' "$MATRIX_DOM" \
                && grep -q 'data-qa-live-status="VIGIL TRIUMPHANT' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not open the production victory path"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ runmode=([a-z-]+) ]]; then
              grep -q "data-qa-run-mode=\"${BASH_REMATCH[1]}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not preserve Run Path mode '${BASH_REMATCH[1]}'"; exit 1;
              }
              if [[ "${BASH_REMATCH[1]}" == "boss-rush" || "${BASH_REMATCH[1]}" == "weekly" ]]; then
                grep -q 'data-qa-boss-rush-active="true"' "$MATRIX_DOM" \
                  && grep -q 'data-qa-gauntlet-metric-safe="true"' "$MATRIX_DOM" || {
                    echo "FAIL: gauntlet scenario '${QUERY}' lacks its controller or selected an unsafe metric"; exit 1;
                  }
              fi
            fi
          done <<'MATRIX'
          emberwood|map=emberwood&tp=buildingInside
          hollowreach|map=hollowreach&tp=buildingExterior
          crypts|map=crypts
          dunes|map=dunes
          emberwood|map=emberwood&tp=vigilSite
          emberwood|map=emberwood&tp=vigilBeaconCleared
          emberwood|map=emberwood&touch=1
          emberwood|screen=menu&tab=home&uiscale=100&contrast=0
          emberwood|screen=menu&tab=home&input=keyboard&focus=tab%3Aplay%230&reduced=1
          emberwood|screen=menu&tab=settings&settingspane=accessibility&uiscale=130&contrast=1&captions=1&captiondetail=full&mono=1&voicevol=40&vibration=full&vibrationcap=0&input=keyboard&focus=setCaptionDetail%3Afull%230
          emberwood|screen=menu&tab=settings&settingspane=accessibility&captions=0&captiondetail=essential&mono=0&voicevol=0&vibration=off&vibrationcap=1
          emberwood|screen=menu&tab=settings&settingspane=general&dev=1&input=keyboard&focus=toggleSetting%3Adebug%230
          emberwood|screen=menu&tab=character&input=keyboard&focus=collectionCategory%3Ahat%230
          emberwood|screen=menu&tab=boutique&input=keyboard&focus=boutiqueCategory%3Aaura%230
          emberwood|uiscale=130&contrast=1&statuses=all&captions=1&captiondetail=full&caption=danger
          emberwood|captions=1&captiondetail=essential&caption=voice
          emberwood|captions=1&vibration=full&bosswarning=1
          emberwood|objectivephase=orientation&objectiveprogress=0.4&runmode=standard
          emberwood|objectivephase=tactic&objectiveprogress=0.5&runmode=boss-rush
          emberwood|objectivephase=tactic&objectiveprogress=0.5&runmode=standard&pause=1
          emberwood|objectivephase=tactic&objectiveprogress=0.5&runmode=standard&gameover=1
          emberwood|objectivephase=tactic&objectiveprogress=0.5&runmode=standard&victory=1
          emberwood|objectivephase=climax&objectiveprogress=0.65&runmode=weekly&touch=1&uiscale=130&reduced=1&contrast=1
          emberwood|objectivephase=climax&objectiveprogress=0.65&runmode=weekly&touch=1&uiscale=130&reduced=1&contrast=1&boss=1&bossid=stormwingAlpha&bossframes=1
          emberwood|screen=menu&tab=battlepass&bpxp=12600&bpclaimthrough=12&bpreceipt=1
          emberwood|screen=menu&tab=shop&mines=250&minessafe=3&input=keyboard&minesFocus=7&reduced=1
          MATRIX

          # Real Chromium/Web Audio graph gate: three independent player buses,
          # stereo->mono->stereo graph continuity, and muted-voice duck safety.
          # The probe is deliberately zero-duration: AudioContext clocks do not
          # advance under Chromium virtual time, so it verifies live nodes and
          # automation targets without a scheduler/media timing race.
          AUDIO_GRAPH_DOM="/tmp/audiographprobe.html"
          AUDIO_GRAPH_PROFILE=$(mktemp -d)
          timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
            --autoplay-policy=no-user-gesture-required \
            --disable-background-networking --disable-component-update \
            --force-device-scale-factor=1 --window-size=1280,720 \
            --user-data-dir="$AUDIO_GRAPH_PROFILE" \
            --dump-dom "http://127.0.0.1:8909/tools/artshot/audiographprobe.html" \
            > "$AUDIO_GRAPH_DOM"
          AUDIO_GRAPH_TITLE=$(grep -o '<title>[^<]*</title>' "$AUDIO_GRAPH_DOM" | head -1)
          echo "Audio graph probe: $AUDIO_GRAPH_TITLE"
          echo "$AUDIO_GRAPH_TITLE" | grep -q 'DONE EXC:0 buses:3 mono:stable voice:mute-safe' || {
            echo 'FAIL: production Web Audio three-bus/mono/voice graph probe did not pass'; exit 1;
          }
          grep -q 'data-qa-ready="1"' "$AUDIO_GRAPH_DOM" \
            && grep -q 'data-qa-buses="3"' "$AUDIO_GRAPH_DOM" \
            && grep -q 'data-qa-mono="stable"' "$AUDIO_GRAPH_DOM" \
            && grep -q 'data-qa-voice="mute-safe"' "$AUDIO_GRAPH_DOM" || {
              echo 'FAIL: Web Audio graph probe omitted its machine-readable receipt'; exit 1;
            }

          # Strict query allowlists must fail loudly rather than silently
          # coercing a screenshot into a different accessibility state.
          INVALID_DOM="/tmp/harness-invalid-controls.html"
          INVALID_PROFILE=$(mktemp -d)
          timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
            --autoplay-policy=no-user-gesture-required \
            --disable-background-networking --disable-component-update \
            --force-device-scale-factor=1 --window-size=1280,720 \
            --virtual-time-budget=7000 --user-data-dir="$INVALID_PROFILE" \
            --dump-dom "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=0&badge=1&screen=menu&tab=settings&uiscale=129&contrast=yes&settingspane=display&statuses=none&captions=yes&captiondetail=verbose&mono=maybe&voicevol=33&vibration=maximum&vibrationcap=yes&caption=speech" \
            > "$INVALID_DOM"
          INVALID_TITLE=$(grep -o '<title>[^<]*</title>' "$INVALID_DOM" | head -1)
          echo "Invalid-control receipt: $INVALID_TITLE"
          echo "$INVALID_TITLE" | grep -q 'DONE EXC:11 ' || {
            echo 'FAIL: invalid accessibility harness controls did not emit eleven deterministic ERR receipts'; exit 1;
          }
          grep -q 'data-qa-ready="1"' "$INVALID_DOM" || {
            echo 'FAIL: invalid accessibility harness controls omitted their QA receipt'; exit 1;
          }
          grep -q 'data-qa-error-keys="caption,captiondetail,captions,contrast,mono,settingspane,statuses,uiscale,vibration,vibrationcap,voicevol"' "$INVALID_DOM" || {
            echo 'FAIL: invalid accessibility harness controls did not report every expected error key'; exit 1;
          }

          INVALID_OBJECTIVE_DOM="/tmp/harness-invalid-objective-controls.html"
          INVALID_OBJECTIVE_PROFILE=$(mktemp -d)
          timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
            --disable-background-networking --disable-component-update \
            --force-device-scale-factor=1 --window-size=1280,720 \
            --virtual-time-budget=7000 --user-data-dir="$INVALID_OBJECTIVE_PROFILE" \
            --dump-dom "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=0&badge=1&screen=menu&runmode=chaos&objectivephase=middle&objectiveprogress=&pause=yes" \
            > "$INVALID_OBJECTIVE_DOM"
          INVALID_OBJECTIVE_TITLE=$(grep -o '<title>[^<]*</title>' "$INVALID_OBJECTIVE_DOM" | head -1)
          echo "Invalid Run Path controls: $INVALID_OBJECTIVE_TITLE"
          echo "$INVALID_OBJECTIVE_TITLE" | grep -q 'DONE EXC:4 ' \
            && grep -q 'data-qa-error-keys="param"' "$INVALID_OBJECTIVE_DOM" || {
              echo 'FAIL: invalid Run Path controls did not fail closed'; exit 1;
            }

          # Lexical strictness: the old numeric parser silently treated an empty
          # voicevol value as zero. The allowlist must reject that exact spelling.
          EMPTY_VOICE_DOM="/tmp/harness-invalid-empty-voice.html"
          EMPTY_VOICE_PROFILE=$(mktemp -d)
          timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
            --disable-background-networking --disable-component-update \
            --force-device-scale-factor=1 --window-size=1280,720 \
            --virtual-time-budget=7000 --user-data-dir="$EMPTY_VOICE_PROFILE" \
            --dump-dom "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=0&badge=1&screen=menu&tab=settings&settingspane=accessibility&voicevol=" \
            > "$EMPTY_VOICE_DOM"
          EMPTY_VOICE_TITLE=$(grep -o '<title>[^<]*</title>' "$EMPTY_VOICE_DOM" | head -1)
          echo "Empty voice-volume receipt: $EMPTY_VOICE_TITLE"
          echo "$EMPTY_VOICE_TITLE" | grep -q 'DONE EXC:1 ' \
            && grep -q 'data-qa-error-keys="voicevol"' "$EMPTY_VOICE_DOM" || {
              echo 'FAIL: empty voicevol bypassed the exact lexical allowlist'; exit 1;
            }

          INVALID_COLLECTION_DOM="/tmp/harness-invalid-collection-controls.html"
          INVALID_COLLECTION_PROFILE=$(mktemp -d)
          timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
            --disable-background-networking --disable-component-update \
            --force-device-scale-factor=1 --window-size=1280,720 \
            --virtual-time-budget=7000 --user-data-dir="$INVALID_COLLECTION_PROFILE" \
            --dump-dom \
            "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=0&badge=1&screen=menu&tab=boutique&collectioncat=weapon&collectionpage=0&pursuit=missing-set" \
            > "$INVALID_COLLECTION_DOM"
          INVALID_COLLECTION_TITLE=$(grep -o '<title>[^<]*</title>' "$INVALID_COLLECTION_DOM" | head -1)
          echo "Invalid Collection controls: $INVALID_COLLECTION_TITLE"
          echo "$INVALID_COLLECTION_TITLE" | grep -q 'DONE EXC:4 ' \
            && grep -q 'data-qa-error-keys="collectioncat,collectionpage,collectionqa,pursuit"' "$INVALID_COLLECTION_DOM" || {
              echo 'FAIL: invalid Collection receipt controls did not fail closed'; exit 1;
            }

          INVALID_COMPLETION_DOM="/tmp/harness-invalid-completion-controls.html"
          INVALID_COMPLETION_PROFILE=$(mktemp -d)
          timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
            --disable-background-networking --disable-component-update \
            --force-device-scale-factor=1 --window-size=1280,720 \
            --virtual-time-budget=7000 --user-data-dir="$INVALID_COMPLETION_PROFILE" \
            --dump-dom \
            "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=0&badge=1&screen=menu&tab=character&completion=bogus&blueprint=bogus&completionfixture=bogus&wallet=-1&blueprintbuy=2" \
            > "$INVALID_COMPLETION_DOM"
          INVALID_COMPLETION_TITLE=$(grep -o '<title>[^<]*</title>' "$INVALID_COMPLETION_DOM" | head -1)
          echo "Invalid Completion controls: $INVALID_COMPLETION_TITLE"
          echo "$INVALID_COMPLETION_TITLE" | grep -q 'DONE EXC:6 ' \
            && grep -q 'data-qa-error-keys="blueprint,blueprintbuy,completion,completionfixture,completionqa,wallet"' "$INVALID_COMPLETION_DOM" || {
              echo 'FAIL: invalid Completion receipt controls did not fail closed'; exit 1;
            }
          # Durable Collection Growth I-A visual receipts. These use the same
          # production Canvas/harness path as the exception matrix above and are
          # uploaded for human layout review; deterministic geometry/source truth
          # remains owned by validate-cosmetic-collection.js.
          COLLECTION_RECEIPTS=/tmp/collection-growth-ia
          rm -rf "$COLLECTION_RECEIPTS" __out
          mkdir -p "$COLLECTION_RECEIPTS" __out
          for COLLECTION_TAB in character boutique; do
            COLLECTION_PROFILE=$(mktemp -d)
            COLLECTION_NAME="${COLLECTION_TAB}-1600x900.png"
            COLLECTION_DOM="/tmp/collection-growth-ia-${COLLECTION_TAB}.html"
            case "$COLLECTION_TAB" in
              character)
                COLLECTION_FOCUS='collectionCategory%3Ahat%230'
                COLLECTION_EXTRA=''
                COLLECTION_EXPECTED_FOCUS='collectionCategory:hat#0'
                ;;
              boutique)
                COLLECTION_FOCUS='boutiqueCategory%3Aaura%230'
                COLLECTION_EXTRA='&tryset=lanternward'
                COLLECTION_EXPECTED_FOCUS='boutiqueCategory:aura#0'
                ;;
            esac
            timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
              --autoplay-policy=no-user-gesture-required \
              --disable-background-networking --disable-component-update \
              --force-device-scale-factor=1 --window-size=1600,900 \
              --virtual-time-budget=7000 --user-data-dir="$COLLECTION_PROFILE" \
              --dump-dom \
              "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=0&screen=menu&tab=${COLLECTION_TAB}&input=keyboard&focus=${COLLECTION_FOCUS}&out=${COLLECTION_NAME}${COLLECTION_EXTRA}" \
              > "$COLLECTION_DOM"
            COLLECTION_TITLE=$(grep -o '<title>[^<]*</title>' "$COLLECTION_DOM" | head -1)
            echo "Collection visual ${COLLECTION_TAB}: $COLLECTION_TITLE"
            echo "$COLLECTION_TITLE" | grep -q 'DONE EXC:0 ' \
              && grep -q 'data-qa-ready="1"' "$COLLECTION_DOM" \
              && grep -q "data-qa-focus=\"${COLLECTION_EXPECTED_FOCUS}\"" "$COLLECTION_DOM" \
              && grep -q 'data-qa-focus-visible="true"' "$COLLECTION_DOM" \
              && grep -q "data-qa-output=\"${COLLECTION_NAME}\"" "$COLLECTION_DOM" || {
              echo "FAIL: ${COLLECTION_TAB} canvas receipt did not finish cleanly"; exit 1;
            }
            if [ "$COLLECTION_TAB" = boutique ]; then
              grep -q 'data-qa-cosmetic-set="lanternward"' "$COLLECTION_DOM" \
                && grep -q 'data-qa-boutique-category="cloak"' "$COLLECTION_DOM" \
                && grep -q 'data-qa-boutique-set-page="3"' "$COLLECTION_DOM" || {
                  echo 'FAIL: Boutique visual did not stage the Lanternward fitting-room state'; exit 1;
                }
            fi
            cp "__out/${COLLECTION_NAME}" "$COLLECTION_RECEIPTS/${COLLECTION_NAME}"
            node tools/artshot/validate-receipt-png.mjs "$COLLECTION_RECEIPTS/${COLLECTION_NAME}"
          done
          cmp -s "$COLLECTION_RECEIPTS/character-1600x900.png" \
            "$COLLECTION_RECEIPTS/boutique-1600x900.png" \
            && { echo 'FAIL: Character and Boutique receipts are byte-identical'; exit 1; }

          # Collection Growth I-B: preserve strict, human-reviewable receipts for
          # the new baked fur materials, persistent Set Pursuit, deterministic
          # Stormglass price ceiling, and honest case-only Gravebell preview.
          COLLECTION_IB_RECEIPTS=/tmp/collection-growth-ib
          rm -rf "$COLLECTION_IB_RECEIPTS"
          mkdir -p "$COLLECTION_IB_RECEIPTS"

          capture_collection_ib() {
            COLLECTION_IB_NAME="$1"
            COLLECTION_IB_WINDOW="$2"
            COLLECTION_IB_QUERY="$3"
            COLLECTION_IB_KIND="$4"
            COLLECTION_IB_DOM="/tmp/collection-growth-ib-${COLLECTION_IB_NAME}.html"
            COLLECTION_IB_WINDOW_WIDTH="${COLLECTION_IB_WINDOW%,*}"
            COLLECTION_IB_WINDOW_HEIGHT="${COLLECTION_IB_WINDOW#*,}"
            COLLECTION_IB_ATTEMPTS=1
            if [[ "$COLLECTION_IB_KIND" == *-touch ]]; then
              COLLECTION_IB_WINDOW_WIDTH=667
              COLLECTION_IB_WINDOW_HEIGHT=375
              COLLECTION_IB_ATTEMPTS=3
            fi
            # Headless Chrome inconsistently interprets --window-size as outer
            # bounds vs content viewport. Calibrate the durable phone receipt to
            # an honest canonical 667x375 inner viewport before saving its canvas.
            for ((COLLECTION_IB_ATTEMPT=1; COLLECTION_IB_ATTEMPT<=COLLECTION_IB_ATTEMPTS; COLLECTION_IB_ATTEMPT++)); do
              COLLECTION_IB_PROFILE=$(mktemp -d)
              COLLECTION_IB_WINDOW="${COLLECTION_IB_WINDOW_WIDTH},${COLLECTION_IB_WINDOW_HEIGHT}"
              timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
                --autoplay-policy=no-user-gesture-required \
                --disable-background-networking --disable-component-update \
                --force-device-scale-factor=1 --window-size="$COLLECTION_IB_WINDOW" \
                --virtual-time-budget=7000 --user-data-dir="$COLLECTION_IB_PROFILE" \
                --dump-dom \
                "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=0&out=${COLLECTION_IB_NAME}.png&${COLLECTION_IB_QUERY}" \
                > "$COLLECTION_IB_DOM"
              if [[ "$COLLECTION_IB_KIND" != *-touch ]]; then break; fi
              COLLECTION_IB_VIEWPORT_WIDTH=$(grep -o 'data-qa-viewport-width="[0-9]*"' "$COLLECTION_IB_DOM" | head -1 | cut -d'"' -f2)
              COLLECTION_IB_VIEWPORT_HEIGHT=$(grep -o 'data-qa-viewport-height="[0-9]*"' "$COLLECTION_IB_DOM" | head -1 | cut -d'"' -f2)
              if [[ ! "$COLLECTION_IB_VIEWPORT_WIDTH" =~ ^[0-9]+$ || ! "$COLLECTION_IB_VIEWPORT_HEIGHT" =~ ^[0-9]+$ ]]; then
                echo 'FAIL: Collection phone capture omitted numeric viewport metrics'; exit 1
              fi
              if (( COLLECTION_IB_VIEWPORT_WIDTH == 667 && COLLECTION_IB_VIEWPORT_HEIGHT == 375 )); then break; fi
              COLLECTION_IB_WINDOW_WIDTH=$((COLLECTION_IB_WINDOW_WIDTH + 667 - COLLECTION_IB_VIEWPORT_WIDTH))
              COLLECTION_IB_WINDOW_HEIGHT=$((COLLECTION_IB_WINDOW_HEIGHT + 375 - COLLECTION_IB_VIEWPORT_HEIGHT))
            done
            COLLECTION_IB_TITLE=$(grep -o '<title>[^<]*</title>' "$COLLECTION_IB_DOM" | head -1)
            echo "Collection I-B ${COLLECTION_IB_NAME}: $COLLECTION_IB_TITLE"
            echo "$COLLECTION_IB_TITLE" | grep -q 'DONE EXC:0 ' \
              && grep -q 'data-qa-ready="1"' "$COLLECTION_IB_DOM" \
              && grep -q "data-qa-output=\"${COLLECTION_IB_NAME}.png\"" "$COLLECTION_IB_DOM" || {
                echo "FAIL: ${COLLECTION_IB_NAME} did not finish with a clean canvas receipt"; exit 1;
              }
            case "$COLLECTION_IB_KIND" in
              collection-keyboard)
                grep -q 'data-qa-input="keyboard"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-focus="collectionCategory:cloak#0"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-focus-visible="true"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-collection-category="fur"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-collection-page="2"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-pursuit-set="stormglass"' "$COLLECTION_IB_DOM" || {
                    echo 'FAIL: desktop Collection receipt did not stage fur page 2 with Stormglass pursuit'; exit 1;
                  }
                ;;
              collection-touch)
                grep -q 'data-qa-input="touch"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-collection-category="fur"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-collection-page="2"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-collection-phone-layout="true"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-collection-touch-safe="true"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-collection-nav-touch-safe="true"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-collection-runtime-matches="true"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-collection-pursuit-guidance="true"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-viewport-width="667"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-viewport-height="375"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-renderer-css-width="667"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-renderer-css-height="375.19"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-renderer-dpr="1"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-renderer-safe-area="0.27,0,0.27,0"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-menu-content-rect="56,249.27,1808,790.46"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-canvas-backing="667x375"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-pursuit-set="stormglass"' "$COLLECTION_IB_DOM" || {
                    echo 'FAIL: phone Collection receipt did not stage its touch-safe pursuit state'; exit 1;
                  }
                ;;
              rites-touch)
                grep -q 'data-qa-input="touch"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-character-phone-pane="rites"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-character-phone-pane-rendered="rites"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-character-phone-pane-touch-safe="true"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-character-hotspots-touch-safe="true"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-viewport-width="667"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-viewport-height="375"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-canvas-backing="667x375"' "$COLLECTION_IB_DOM" || {
                    echo 'FAIL: phone Hero Rites receipt did not stage a touch-safe Character pane'; exit 1;
                  }
                ;;
              stormglass)
                grep -q 'data-qa-cosmetic-set="stormglass"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-boutique-category="cloak"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-boutique-trail-preview="true"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-boutique-set-page="5"' "$COLLECTION_IB_DOM" || {
                    echo 'FAIL: Boutique receipt did not render the Stormglass set and trail'; exit 1;
                  }
                ;;
              gravebell)
                grep -q 'data-qa-cosmetic-set="gravebell"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-boutique-category="cloak"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-boutique-trail-preview="true"' "$COLLECTION_IB_DOM" \
                  && grep -q 'data-qa-boutique-set-page="5"' "$COLLECTION_IB_DOM" || {
                    echo 'FAIL: Boutique receipt did not render the Gravebell set and trail'; exit 1;
                  }
                ;;
            esac
            cp "__out/${COLLECTION_IB_NAME}.png" "$COLLECTION_IB_RECEIPTS/${COLLECTION_IB_NAME}.png"
            if [[ "$COLLECTION_IB_KIND" == *-touch ]]; then
              # The viewport calibration above makes this the production canvas,
              # not an outer-window crop mislabeled as a phone receipt.
              node tools/artshot/validate-receipt-png.mjs \
                "$COLLECTION_IB_RECEIPTS/${COLLECTION_IB_NAME}.png" --width=667 --height=375
            else
              node tools/artshot/validate-receipt-png.mjs "$COLLECTION_IB_RECEIPTS/${COLLECTION_IB_NAME}.png"
            fi
          }

          capture_collection_ib collection-fur-page2-desktop 1600,900 \
            'screen=menu&tab=character&collectioncat=fur&collectionpage=2&pursuit=stormglass&input=keyboard&focus=collectionCategory%3Acloak%230' \
            collection-keyboard
          capture_collection_ib collection-fur-page2-phone 667,375 \
            'screen=menu&tab=character&collectioncat=fur&collectionpage=2&pursuit=stormglass&input=touch' \
            collection-touch
          capture_collection_ib character-hero-rites-phone 667,375 \
            'screen=menu&tab=character&characterpane=rites&input=touch' \
            rites-touch
          capture_collection_ib boutique-stormglass 1600,900 \
            'screen=menu&tab=boutique&tryset=stormglass&input=keyboard&focus=boutiqueCategory%3Aaura%230' \
            stormglass
          capture_collection_ib boutique-gravebell 1600,900 \
            'screen=menu&tab=boutique&tryset=gravebell&input=keyboard&focus=boutiqueCategory%3Aaura%230' \
            gravebell

          [ "$(sha256sum "$COLLECTION_IB_RECEIPTS"/*.png | awk '{print $1}' | sort -u | wc -l)" -eq 5 ] || {
            echo 'FAIL: Collection I-B visual receipts were not five distinct frames'; exit 1;
          }

          # Collection Completion Truth: durable human receipts for fresh-profile
          # catalog truth, the deterministic Mythic Blueprint route, Royal Case
          # disclosure, and the exact production two-press purchase transition.
          COMPLETION_RECEIPTS=/tmp/collection-completion-truth
          rm -rf "$COMPLETION_RECEIPTS"
          mkdir -p "$COMPLETION_RECEIPTS"

          capture_completion_truth() {
            COMPLETION_NAME="$1"
            COMPLETION_WINDOW="$2"
            COMPLETION_QUERY="$3"
            COMPLETION_KIND="$4"
            COMPLETION_DOM="/tmp/collection-completion-${COMPLETION_NAME}.html"
            COMPLETION_TARGET_WIDTH="${COMPLETION_WINDOW%,*}"
            COMPLETION_TARGET_HEIGHT="${COMPLETION_WINDOW#*,}"
            COMPLETION_WINDOW_WIDTH="$COMPLETION_TARGET_WIDTH"
            COMPLETION_WINDOW_HEIGHT="$COMPLETION_TARGET_HEIGHT"
            COMPLETION_ATTEMPTS=3
            for ((COMPLETION_ATTEMPT=1; COMPLETION_ATTEMPT<=COMPLETION_ATTEMPTS; COMPLETION_ATTEMPT++)); do
              COMPLETION_PROFILE=$(mktemp -d)
              COMPLETION_WINDOW="${COMPLETION_WINDOW_WIDTH},${COMPLETION_WINDOW_HEIGHT}"
              COMPLETION_URL="http://127.0.0.1:8909/tools/artshot/harness.html?seconds=0&out=${COMPLETION_NAME}.png&${COMPLETION_QUERY}"
              # Chromium clamps a top-level headless window below 500 CSS px on
              # this runner. For the committed 480x270 acceptance tier, host the
              # unchanged production harness in an exact same-origin iframe and
              # mirror its inert QA receipt to the outer document. The game,
              # renderer, Canvas backing, and persisted PNG all see 480x270.
              if (( COMPLETION_TARGET_WIDTH < 500 )); then
                COMPLETION_WINDOW="800,600"
                COMPLETION_URL="http://127.0.0.1:8909/tools/artshot/exact-frame.html?width=${COMPLETION_TARGET_WIDTH}&height=${COMPLETION_TARGET_HEIGHT}#/tools/artshot/harness.html?seconds=0&out=${COMPLETION_NAME}.png&${COMPLETION_QUERY}"
              fi
              timeout 30s "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
                --autoplay-policy=no-user-gesture-required \
                --disable-background-networking --disable-component-update \
                --force-device-scale-factor=1 --window-size="$COMPLETION_WINDOW" \
                --virtual-time-budget=7000 --user-data-dir="$COMPLETION_PROFILE" \
                --dump-dom "$COMPLETION_URL" \
                > "$COMPLETION_DOM"
              COMPLETION_VIEWPORT_WIDTH=$(grep -o 'data-qa-viewport-width="[0-9]*"' "$COMPLETION_DOM" | head -1 | cut -d'"' -f2)
              COMPLETION_VIEWPORT_HEIGHT=$(grep -o 'data-qa-viewport-height="[0-9]*"' "$COMPLETION_DOM" | head -1 | cut -d'"' -f2)
              if [[ ! "$COMPLETION_VIEWPORT_WIDTH" =~ ^[0-9]+$ || ! "$COMPLETION_VIEWPORT_HEIGHT" =~ ^[0-9]+$ ]]; then
                echo 'FAIL: Completion capture omitted numeric viewport metrics'; exit 1
              fi
              if (( COMPLETION_VIEWPORT_WIDTH == COMPLETION_TARGET_WIDTH && COMPLETION_VIEWPORT_HEIGHT == COMPLETION_TARGET_HEIGHT )); then break; fi
              COMPLETION_WINDOW_WIDTH=$((COMPLETION_WINDOW_WIDTH + COMPLETION_TARGET_WIDTH - COMPLETION_VIEWPORT_WIDTH))
              COMPLETION_WINDOW_HEIGHT=$((COMPLETION_WINDOW_HEIGHT + COMPLETION_TARGET_HEIGHT - COMPLETION_VIEWPORT_HEIGHT))
            done
            COMPLETION_TITLE=$(grep -o '<title>[^<]*</title>' "$COMPLETION_DOM" | head -1)
            echo "Collection Completion ${COMPLETION_NAME}: $COMPLETION_TITLE"
            echo "Completion viewport ${COMPLETION_VIEWPORT_WIDTH}x${COMPLETION_VIEWPORT_HEIGHT}; target ${COMPLETION_TARGET_WIDTH}x${COMPLETION_TARGET_HEIGHT}"
            echo "$COMPLETION_TITLE" | grep -q 'DONE EXC:0 ' \
              && grep -q 'data-qa-ready="1"' "$COMPLETION_DOM" \
              && grep -q "data-qa-output=\"${COMPLETION_NAME}.png\"" "$COMPLETION_DOM" \
              && grep -q 'data-qa-completion-open="true"' "$COMPLETION_DOM" \
              && grep -q 'data-qa-completion-rendered="true"' "$COMPLETION_DOM" \
              && grep -q 'data-qa-completion-text-safe="true"' "$COMPLETION_DOM" \
              && grep -q "data-qa-viewport-width=\"${COMPLETION_TARGET_WIDTH}\"" "$COMPLETION_DOM" \
              && grep -q "data-qa-viewport-height=\"${COMPLETION_TARGET_HEIGHT}\"" "$COMPLETION_DOM" \
              && grep -q "data-qa-canvas-backing=\"${COMPLETION_TARGET_WIDTH}x${COMPLETION_TARGET_HEIGHT}\"" "$COMPLETION_DOM" \
              && grep -q 'data-qa-completion-total="103"' "$COMPLETION_DOM" \
              && grep -q 'data-qa-completion-deterministic="85"' "$COMPLETION_DOM" \
              && grep -q 'data-qa-completion-case-only="18"' "$COMPLETION_DOM" \
              && grep -q 'data-qa-completion-case-only-mythic="0"' "$COMPLETION_DOM" \
              && grep -q 'data-qa-completion-sources="starter:13,boutique:44,blueprint:2,case:61,achievement:19,vigil:10"' "$COMPLETION_DOM" || {
                echo "FAIL: ${COMPLETION_NAME} did not finish with canonical Completion truth"; exit 1;
              }
            if [[ "$COMPLETION_KIND" == *-touch || "$COMPLETION_KIND" == *-compact ]]; then
              grep -q 'data-qa-input="touch"' "$COMPLETION_DOM" \
                && grep -q 'data-qa-completion-touch-safe="true"' "$COMPLETION_DOM" \
                && grep -q 'data-qa-character-hotspots-touch-safe="true"' "$COMPLETION_DOM" \
                && grep -q "data-qa-viewport-width=\"${COMPLETION_TARGET_WIDTH}\"" "$COMPLETION_DOM" \
                && grep -q "data-qa-viewport-height=\"${COMPLETION_TARGET_HEIGHT}\"" "$COMPLETION_DOM" \
                && grep -q "data-qa-canvas-backing=\"${COMPLETION_TARGET_WIDTH}x${COMPLETION_TARGET_HEIGHT}\"" "$COMPLETION_DOM" || {
                  echo "FAIL: ${COMPLETION_NAME} is not an exact touch-safe phone receipt"; exit 1;
                }
            fi
            if [[ "$COMPLETION_KIND" == *-compact ]]; then
              grep -q "data-qa-frame-viewport=\"${COMPLETION_TARGET_WIDTH}x${COMPLETION_TARGET_HEIGHT}\"" "$COMPLETION_DOM" || {
                echo "FAIL: ${COMPLETION_NAME} did not run inside the exact compact frame"; exit 1;
              }
            fi
            case "$COMPLETION_KIND" in
              overview-keyboard)
                grep -q 'data-qa-completion-section="overview"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-rendered-section="overview"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-owned="13"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-sets-complete="0"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-categories="fur:3/18,cloak:2/20,hat:3/22,aura:2/21,trail:3/22"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-focus="collectionCompletionSection:sources#0"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-focus-visible="true"' "$COMPLETION_DOM" || {
                    echo 'FAIL: desktop Overview receipt lost fresh-profile or focus truth'; exit 1;
                  }
                ;;
              overview-touch|overview-compact)
                grep -q 'data-qa-completion-section="overview"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-owned="13"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-sets-complete="0"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-reduced="true"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-high-contrast="true"' "$COMPLETION_DOM" || {
                    echo 'FAIL: phone Overview receipt lost fresh-profile accessibility truth'; exit 1;
                  }
                ;;
              sources-compact)
                grep -q 'data-qa-completion-section="sources"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-owned="13"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-sources="starter:13,boutique:44,blueprint:2,case:61,achievement:19,vigil:10"' "$COMPLETION_DOM" || {
                    echo 'FAIL: compact Sources receipt lost route authority'; exit 1;
                  }
                ;;
              blueprint-keyboard|blueprint-touch|blueprint-compact)
                grep -q 'data-qa-completion-section="blueprint"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-blueprint-id="aura_requiem"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-blueprint-claims=""' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-blueprint-receipt=""' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-gravebell="4/5"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-owned="17"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-wallet="80000"' "$COMPLETION_DOM" || {
                    echo 'FAIL: Requiem detail receipt lost its exact pre-purchase state'; exit 1;
                  }
                ;;
              case-keyboard|case-compact)
                grep -q 'data-qa-completion-section="case"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-blueprint-id="aura_requiem"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-gravebell="4/5"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-wallet="80000"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-case-truth="59:8200:1080:720:150:10:0:false"' "$COMPLETION_DOM" || {
                    echo 'FAIL: Royal Case Truth receipt lost its selected target context'; exit 1;
                  }
                ;;
              purchase-touch)
                grep -q 'data-qa-completion-section="blueprint"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-blueprint-id="aura_requiem"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-blueprint-pending=""' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-blueprint-receipt="aura_requiem:72000:8000"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-blueprint-claims="aura_requiem"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-wallet="8000"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-owned="18"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-gravebell="5/5"' "$COMPLETION_DOM" \
                  && grep -q 'data-qa-completion-sets-complete="1"' "$COMPLETION_DOM" || {
                    echo 'FAIL: purchased Requiem receipt lost its atomic production transition'; exit 1;
                  }
                ;;
            esac
            cp "__out/${COMPLETION_NAME}.png" "$COMPLETION_RECEIPTS/${COMPLETION_NAME}.png"
            node tools/artshot/validate-receipt-png.mjs \
              "$COMPLETION_RECEIPTS/${COMPLETION_NAME}.png" \
              --width="$COMPLETION_TARGET_WIDTH" --height="$COMPLETION_TARGET_HEIGHT"
          }

          capture_completion_truth completion-overview-desktop 1600,900 \
            'screen=menu&tab=character&resetprofile=1&completion=overview&input=keyboard&focus=collectionCompletionSection%3Asources%230' \
            overview-keyboard
          capture_completion_truth completion-overview-phone 667,375 \
            'screen=menu&tab=character&resetprofile=1&completion=overview&input=touch&reduced=1&contrast=1' \
            overview-touch
          capture_completion_truth completion-requiem-desktop 1600,900 \
            'screen=menu&tab=character&resetprofile=1&completion=blueprint&blueprint=aura_requiem&completionfixture=gravebell4&wallet=80000&input=keyboard' \
            blueprint-keyboard
          capture_completion_truth completion-requiem-phone 667,375 \
            'screen=menu&tab=character&resetprofile=1&completion=blueprint&blueprint=aura_requiem&completionfixture=gravebell4&wallet=80000&input=touch' \
            blueprint-touch
          capture_completion_truth completion-royal-case-truth 1600,900 \
            'screen=menu&tab=character&resetprofile=1&completion=case&blueprint=aura_requiem&completionfixture=gravebell4&wallet=80000&input=keyboard' \
            case-keyboard
          capture_completion_truth completion-requiem-purchased 667,375 \
            'screen=menu&tab=character&resetprofile=1&completion=blueprint&blueprint=aura_requiem&completionfixture=gravebell4&wallet=80000&blueprintbuy=1&input=touch' \
            purchase-touch
          capture_completion_truth completion-overview-compact 480,270 \
            'screen=menu&tab=character&resetprofile=1&completion=overview&input=touch&reduced=1&contrast=1' \
            overview-compact
          capture_completion_truth completion-sources-compact 480,270 \
            'screen=menu&tab=character&resetprofile=1&completion=sources&input=touch' \
            sources-compact
          capture_completion_truth completion-requiem-compact 480,270 \
            'screen=menu&tab=character&resetprofile=1&completion=blueprint&blueprint=aura_requiem&completionfixture=gravebell4&wallet=80000&input=touch' \
            blueprint-compact
          capture_completion_truth completion-case-compact 480,270 \
            'screen=menu&tab=character&resetprofile=1&completion=case&blueprint=aura_requiem&completionfixture=gravebell4&wallet=80000&input=touch' \
            case-compact

          [ "$(sha256sum "$COMPLETION_RECEIPTS"/*.png | awk '{print $1}' | sort -u | wc -l)" -eq 10 ] || {
            echo 'FAIL: Collection Completion visual receipts were not ten distinct frames'; exit 1;
          }
          echo "Harness render matrix OK (4 biomes, house branches, Living Vigil, touch, keyboard focus, accessibility preferences, combat statuses, Collection, Boutique, menus, Mines)"

      - name: Upload Collection Growth I-A visual receipts
        uses: actions/upload-artifact@v4
        with:
          name: collection-growth-ia-visual-receipts
          path: /tmp/collection-growth-ia/*.png
          if-no-files-found: error
          retention-days: 30

      - name: Upload Collection Growth I-B visual receipts
        uses: actions/upload-artifact@v4
        with:
          name: collection-growth-ib-visual-receipts
          path: /tmp/collection-growth-ib/*.png
          if-no-files-found: error
          retention-days: 30

      - name: Upload Collection Completion Truth visual receipts
        uses: actions/upload-artifact@v4
        with:
          name: collection-completion-truth-visual-receipts
          path: /tmp/collection-completion-truth/*.png
          if-no-files-found: error
          retention-days: 30
