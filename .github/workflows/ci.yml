# CI — automates the repo's existing verify-before-ship pattern:
#   1. node --check every ES module under src/ (syntax gate, no bundler)
#   2. node tools/validate-assets.js (every AI/licensed asset is credited)
#   2b. node tools/validate-bosses.js (apex phase-2 pools resolve + keep their
#       signature; every attack telegraphs) — guards the silent revert-to-full-
#       kit failure where a typo'd phase2Attacks id passes every smoke test
#   2c. progression, fair-gambling, combat-integrity, UX-flow, Living Vigil,
#       world/HUD, house-navigation, and adaptive-audio data/policy gates
#   3. headless-Chromium harness smoke: boot the REAL game for 20 sim-seconds
#      via tools/artshot/harness.html and assert zero exceptions (EXC: 0)
#      and a live swarm (enemies > 0), read from the harness's document.title
#      ("DONE EXC:<n> enemies:<m>").
# Mirrors the manual gate in CLAUDE.md; pages.yml still owns deploys.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 22+: `node --check` auto-detects ESM syntax in .js files (this
      # no-bundler repo has no package.json "type" field to declare it).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax-check all src modules
        run: |
          set -e
          find src tools \( -name '*.js' -o -name '*.mjs' \) | while read -r f; do
            node --check "$f"
          done
          echo "node --check: all modules OK"

      - name: Validate asset credits
        run: node tools/validate-assets.js

      - name: Validate boss kits (phase-2 integrity + telegraphs)
        run: node tools/validate-bosses.js

      - name: Validate progression economy
        run: node tools/validate-progression.js

      - name: Validate fair gambling economy and disclosures
        run: node tools/validate-gambling-economy.js

      - name: Validate combat integrity
        run: node tools/validate-combat-integrity.js

      - name: Validate UX flows
        run: node tools/validate-ux-flows.js

      - name: Validate accessibility and input contracts
        run: node tools/validate-accessibility.js

      - name: Validate high-contrast combat cues
        run: node tools/validate-combat-cues.js

      - name: Validate reduced-motion save inheritance
        run: node tools/validate-accessibility-save.js

      - name: Validate accessible minigame motion and focus
        run: node tools/validate-minigame-accessibility.js

      - name: Validate phone Settings geometry
        run: node tools/validate-phone-settings.js

      - name: Validate Living Vigil sites
        run: node tools/validate-vigil-sites.js

      - name: Validate Living Vigil tactical encounters
        run: node tools/validate-encounters.js

      - name: Validate Living Vigil tracker
        run: node tools/validate-vigil-tracker.js

      - name: Validate Living Vigil integration
        run: node tools/validate-living-vigil-integration.js

      - name: Validate biome dressing and structure cohesion
        run: node tools/validate-world.js

      - name: Validate HUD layout contracts
        run: node tools/validate-hud-layout.js

      - name: Validate house-safe enemy navigation
        run: node tools/validate-navigation.js

      - name: Validate adaptive score catalog and policy
        run: node tools/validate-audio.js

      - name: Harness smoke (EXC 0, enemies alive)
        run: |
          set -e
          # Serve the repo root exactly like local verification does.
          python3 tools/artshot/serve.py 8909 . &
          sleep 1
          # Prefer the dev container's pinned Playwright Chromium when present
          # (so this step runs identically in local sandboxes); fall back to
          # the runner image's Chrome.
          CHROME=$(ls /opt/pw-browsers/chromium-*/chrome-linux/chrome 2>/dev/null | head -1 || true)
          CHROME=${CHROME:-$(command -v google-chrome || command -v chromium-browser || command -v chromium)}
          echo "Using browser: $CHROME"
          # --dump-dom serializes the page after the virtual-time budget, so
          # the <title> carries the harness's final "DONE EXC:<n> enemies:<m>".
          "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
            --autoplay-policy=no-user-gesture-required \
            --disable-background-networking --disable-component-update \
            --force-device-scale-factor=1 --window-size=1600,900 \
            --virtual-time-budget=15000 --user-data-dir="$(mktemp -d)" \
            --dump-dom "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=20&badge=1" \
            > /tmp/harness-dom.html
          TITLE=$(grep -o '<title>[^<]*</title>' /tmp/harness-dom.html | head -1)
          echo "Harness title: $TITLE"
          echo "$TITLE" | grep -q 'DONE EXC:0 ' || { echo 'FAIL: harness reported exceptions (or never finished)'; exit 1; }
          ENEMIES=$(echo "$TITLE" | grep -o 'enemies:[0-9-]*' | cut -d: -f2)
          [ "${ENEMIES:-0}" -gt 0 ] || { echo "FAIL: no live enemies after 20s (enemies=$ENEMIES)"; exit 1; }
          echo "Harness smoke OK ($TITLE)"

          # Fast render-branch matrix: every biome, both house camera branches,
          # Living Vigil rewards, touch HUD, progression receipt and Mines must
          # render exception-free in the same real-game harness used locally.
          MATRIX_INDEX=0
          while IFS='|' read -r EXPECTED_MAP QUERY; do
            MATRIX_INDEX=$((MATRIX_INDEX + 1))
            MATRIX_DOM="/tmp/harness-matrix-${MATRIX_INDEX}.html"
            MATRIX_PROFILE=$(mktemp -d)
            "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
              --autoplay-policy=no-user-gesture-required \
              --disable-background-networking --disable-component-update \
              --force-device-scale-factor=1 --window-size=1280,720 \
              --virtual-time-budget=7000 --user-data-dir="$MATRIX_PROFILE" \
              --dump-dom "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=1&badge=1&${QUERY}" \
              > "$MATRIX_DOM"
            MATRIX_TITLE=$(grep -o '<title>[^<]*</title>' "$MATRIX_DOM" | head -1)
            echo "Matrix ${MATRIX_INDEX}: $MATRIX_TITLE"
            echo "$MATRIX_TITLE" | grep -q 'DONE EXC:0 ' || {
              echo "FAIL: matrix scenario '${QUERY}' reported exceptions (or never finished)"; exit 1;
            }
            echo "$MATRIX_TITLE" | grep -q "map:${EXPECTED_MAP}" || {
              echo "FAIL: matrix scenario '${QUERY}' did not render requested map '${EXPECTED_MAP}'"; exit 1;
            }
            grep -q 'data-qa-ready="1"' "$MATRIX_DOM" || {
              echo "FAIL: matrix scenario '${QUERY}' omitted its QA receipt"; exit 1;
            }
            if [[ "$QUERY" == *"input=keyboard"* ]]; then
              grep -q 'data-qa-input="keyboard"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not stage keyboard modality"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"reduced=1"* ]]; then
              grep -q 'data-qa-reduced="true"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not persist Reduced Effects"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ uiscale=([0-9]+) ]]; then
              EXPECTED_UI_SCALE="${BASH_REMATCH[1]}"
              grep -q "data-qa-ui-scale=\"${EXPECTED_UI_SCALE}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not apply Combat HUD size ${EXPECTED_UI_SCALE}%"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ contrast=([01]) ]]; then
              EXPECTED_CONTRAST="false"
              if [ "${BASH_REMATCH[1]}" = "1" ]; then EXPECTED_CONTRAST="true"; fi
              grep -q "data-qa-high-contrast=\"${EXPECTED_CONTRAST}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not apply high contrast=${EXPECTED_CONTRAST}"; exit 1;
              }
            fi
            if [[ "$QUERY" =~ settingspane=([a-z]+) ]]; then
              EXPECTED_SETTINGS_PANE="${BASH_REMATCH[1]}"
              grep -q "data-qa-settings-pane=\"${EXPECTED_SETTINGS_PANE}\"" "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not stage Settings pane '${EXPECTED_SETTINGS_PANE}'"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"statuses=all"* ]]; then
              grep -q 'data-qa-statuses="all"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not stage every combat status cue"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"focus=tab%3Aplay%230"* ]]; then
              grep -q 'data-qa-focus="tab:play#0"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not retain the requested menu focus"; exit 1;
              }
              grep -q 'data-qa-focus-visible="true"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not expose visible keyboard focus"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"focus=setUiScale%3A130%230"* ]]; then
              grep -q 'data-qa-focus="setUiScale:130#0"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not retain the 130% Combat HUD size focus"; exit 1;
              }
              grep -q 'data-qa-focus-visible="true"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not expose visible keyboard focus"; exit 1;
              }
            fi
            if [[ "$QUERY" == *"minesFocus=7"* ]]; then
              grep -q 'data-qa-mines-focus="7"' "$MATRIX_DOM" || {
                echo "FAIL: matrix scenario '${QUERY}' did not retain the requested Mines focus"; exit 1;
              }
            fi
          done <<'MATRIX'
          emberwood|map=emberwood&tp=buildingInside
          hollowreach|map=hollowreach&tp=buildingExterior
          crypts|map=crypts
          dunes|map=dunes
          emberwood|map=emberwood&tp=vigilSite
          emberwood|map=emberwood&tp=vigilBeaconCleared
          emberwood|map=emberwood&touch=1
          emberwood|screen=menu&tab=home&uiscale=100&contrast=0
          emberwood|screen=menu&tab=home&input=keyboard&focus=tab%3Aplay%230&reduced=1
          emberwood|screen=menu&tab=settings&settingspane=accessibility&uiscale=130&contrast=1&input=keyboard&focus=setUiScale%3A130%230
          emberwood|uiscale=130&contrast=1&statuses=all
          emberwood|screen=menu&tab=battlepass&bpxp=12600&bpclaimthrough=12&bpreceipt=1
          emberwood|screen=menu&tab=shop&mines=250&minessafe=3&input=keyboard&minesFocus=7&reduced=1
          MATRIX

          # Strict query allowlists must fail loudly rather than silently
          # coercing a screenshot into a different accessibility state.
          INVALID_DOM="/tmp/harness-invalid-controls.html"
          INVALID_PROFILE=$(mktemp -d)
          "$CHROME" --headless=new --no-sandbox --disable-gpu --mute-audio \
            --autoplay-policy=no-user-gesture-required \
            --disable-background-networking --disable-component-update \
            --force-device-scale-factor=1 --window-size=1280,720 \
            --virtual-time-budget=7000 --user-data-dir="$INVALID_PROFILE" \
            --dump-dom "http://127.0.0.1:8909/tools/artshot/harness.html?seconds=0&badge=1&screen=menu&tab=settings&uiscale=129&contrast=yes&settingspane=display&statuses=none" \
            > "$INVALID_DOM"
          INVALID_TITLE=$(grep -o '<title>[^<]*</title>' "$INVALID_DOM" | head -1)
          echo "Invalid-control receipt: $INVALID_TITLE"
          echo "$INVALID_TITLE" | grep -q 'DONE EXC:4 ' || {
            echo 'FAIL: invalid accessibility harness controls did not emit four deterministic ERR receipts'; exit 1;
          }
          grep -q 'data-qa-ready="1"' "$INVALID_DOM" || {
            echo 'FAIL: invalid accessibility harness controls omitted their QA receipt'; exit 1;
          }
          echo "Harness render matrix OK (4 biomes, house branches, Living Vigil, touch, keyboard focus, accessibility preferences, combat statuses, menus, Mines)"
